
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricette Salutari — Edizione Campana</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ──────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#f5f0e8;--sand:#e8dcc8;--terracotta:#c4673a;--olive:#6b7c4a;
  --deep:#2a1f14;--gold:#c9a84c;--sea:#3a6b7c;--navy:#1B4F72;
  --mint:#EAFAF1;--peach:#FDEBD0;--sky:#EBF5FB;--sky2:#D6EAF8;
  --motiv:#1D6A39;--aller:#784212;--purple:#6C3483;--purple-bg:#F5EEF8;
  --appro:#7a5c10;--appro-bg:#fdf6e3;
}
html{scroll-behavior:smooth}
body{background:var(--cream);font-family:'Crimson Pro',serif;color:var(--deep);min-height:100vh;
  background-image:radial-gradient(ellipse at 10% 20%,rgba(196,103,58,.07) 0%,transparent 50%),
                   radial-gradient(ellipse at 90% 80%,rgba(58,107,124,.07) 0%,transparent 50%)}

/* ─── EDITOR SIDEBAR ──────────────────────────────── */
#editor-sidebar{
  position:fixed;top:0;right:0;width:480px;height:100vh;
  background:#1a1a2e;color:#e8e8f0;z-index:2000;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 40px rgba(0,0,0,.4);
}
#editor-sidebar.open{transform:translateX(0)}
.editor-top{background:#16213e;padding:1rem 1.2rem;display:flex;align-items:center;gap:.8rem;border-bottom:1px solid #2d2d50;flex-shrink:0}
.editor-top h2{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;flex:1;color:#c9b9e8}
.editor-close{background:none;border:none;color:#999;font-size:1.4rem;cursor:pointer;line-height:1;padding:.2rem}
.editor-close:hover{color:#fff}
.editor-recipe-select{padding:.5rem .8rem .5rem 1.2rem;background:#16213e;border-bottom:1px solid #2d2d50;flex-shrink:0}
.editor-recipe-select select{width:100%;background:#0f3460;color:#e8e8f0;border:1px solid #2d5f8f;border-radius:3px;padding:.5rem .8rem;font-family:'Crimson Pro',serif;font-size:.95rem;cursor:pointer}
.editor-body{flex:1;overflow-y:auto;padding:1.2rem}
.editor-body::-webkit-scrollbar{width:5px}
.editor-body::-webkit-scrollbar-track{background:#16213e}
.editor-body::-webkit-scrollbar-thumb{background:#2d5f8f;border-radius:3px}
.field-group{margin-bottom:1.1rem}
.field-group label{display:block;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#8899cc;margin-bottom:.35rem}
.field-group input,.field-group textarea,.field-group select{width:100%;background:#0d1b2a;color:#e8e8f0;border:1px solid #2d3a5a;border-radius:3px;padding:.55rem .75rem;font-family:'Crimson Pro',serif;font-size:.92rem;line-height:1.5;resize:vertical;transition:border-color .2s}
.field-group input:focus,.field-group textarea:focus,.field-group select:focus{outline:none;border-color:#5b8ee6;background:#0f2340}
.field-group textarea{min-height:80px}
.field-group textarea.tall{min-height:120px}
.field-sep{height:1px;background:#2d2d50;margin:1.2rem 0}
.field-section-title{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:#6c9fff;margin-bottom:.8rem;padding:.3rem 0;border-bottom:1px solid #1f2f50}
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem}
.editor-footer{padding:1rem 1.2rem;background:#16213e;border-top:1px solid #2d2d50;display:flex;gap:.6rem;flex-shrink:0}
.btn-apply{flex:1;padding:.65rem;background:#1D6A39;color:#fff;border:none;border-radius:3px;font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.btn-apply:hover{background:#27a34f}
.btn-download{flex:1;padding:.65rem;background:#c4673a;color:#fff;border:none;border-radius:3px;font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.btn-download:hover{background:#d4834a}
.btn-new{padding:.65rem 1rem;background:#1B4F72;color:#fff;border:none;border-radius:3px;font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.btn-new:hover{background:#2471a3}

/* ─── EDIT TOGGLE BUTTON ──────────────────────────── */
#edit-fab{position:fixed;bottom:1.8rem;right:1.8rem;z-index:1500;width:54px;height:54px;border-radius:50%;background:var(--navy);color:#fff;border:none;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 20px rgba(27,79,114,.45);transition:all .22s;display:flex;align-items:center;justify-content:center}
#edit-fab:hover{background:var(--terracotta);transform:scale(1.07)}
#edit-fab.active{background:var(--terracotta)}

/* ─── TOAST ───────────────────────────────────────── */
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(60px);background:#1D6A39;color:#fff;padding:.6rem 1.4rem;border-radius:3px;font-size:.85rem;letter-spacing:.06em;z-index:3000;transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ─── HEADER ──────────────────────────────────────── */
.site-header{text-align:center;padding:3.5rem 2rem 1.5rem}
.header-line{width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 1.4rem}
.site-header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.4rem);font-weight:400;letter-spacing:.05em;line-height:1.1}
.site-header h1 em{font-style:italic;color:var(--terracotta)}
.site-header p{margin-top:.7rem;font-size:.82rem;color:var(--sea);font-weight:300;letter-spacing:.14em;text-transform:uppercase}

/* ─── VIEW TABS ───────────────────────────────────── */
.view-tabs{display:flex;justify-content:center;gap:0;margin:1.2rem auto 0;max-width:700px !important;border:1.5px solid var(--sand);border-radius:3px;overflow:hidden}
.view-tab{flex:1;padding:.55rem 1rem;font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;cursor:pointer;border:none;background:transparent;color:var(--deep);transition:all .22s;text-transform:uppercase}
.view-tab+.view-tab{border-left:1.5px solid var(--sand)}
.view-tab.active{background:var(--navy);color:#fff}
.view-tab:not(.active):hover{background:var(--sand)}

/* ─── FILTER BAR ──────────────────────────────────── */
.filter-bar{display:flex;justify-content:center;flex-wrap:wrap;gap:.55rem;padding:1.4rem 2rem 2rem}
.filter-btn{border:1.5px solid var(--sand);background:transparent;color:var(--deep);font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.06em;padding:.38rem 1rem;cursor:pointer;border-radius:2px;transition:all .22s}
.filter-btn:hover{background:var(--deep);color:var(--cream);border-color:var(--deep)}
.filter-btn.active{background:var(--terracotta);border-color:var(--terracotta);color:#fff}
.view-panel{display:none}
.view-panel.active{display:block}

/* ─── CARDS ───────────────────────────────────────── */
.cards-grid{max-width:1400px;margin:0 auto;padding:0 2rem 5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1.8rem}
.card{background:#fff;border-radius:3px;overflow:hidden;box-shadow:0 2px 18px rgba(42,31,20,.06);transition:transform .28s,box-shadow .28s;display:flex;flex-direction:column;opacity:0;animation:fadeUp .5s ease forwards;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 36px rgba(42,31,20,.16)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.08s}
.card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.16s}
.card:nth-child(5){animation-delay:.20s}.card:nth-child(6){animation-delay:.24s}
.card:nth-child(7){animation-delay:.28s}.card:nth-child(8){animation-delay:.32s}
.card:nth-child(9){animation-delay:.36s}.card:nth-child(10){animation-delay:.40s}
.card:nth-child(11){animation-delay:.44s}.card:nth-child(12){animation-delay:.48s}
.card:nth-child(13){animation-delay:.52s}
.card-accent{height:4px;width:100%}
.card-body{padding:1.5rem 1.5rem .9rem;flex:1}
.card-category{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;opacity:.75;margin-bottom:.45rem}
.card-title{font-family:'Playfair Display',serif;font-size:1.17rem;font-weight:400;line-height:1.35;margin-bottom:.4rem}
.card-chef{font-size:.8rem;font-style:italic;opacity:.55;margin-bottom:.5rem}
.porzioni-badge{display:inline-block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;background:var(--deep);color:var(--cream);padding:.18rem .6rem;border-radius:2px;margin-bottom:.5rem}
.divider{height:1px;background:linear-gradient(90deg,var(--sand),transparent);margin:.7rem 0}
.tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.7rem}
.tag{font-size:.7rem;padding:.18rem .55rem;border-radius:2px;letter-spacing:.04em}
.tag-km0{background:rgba(107,124,74,.12);color:var(--olive)}
.tag-dop{background:rgba(201,168,76,.15);color:#8a6d1a}
.tag-mare{background:rgba(58,107,124,.12);color:var(--sea)}
.tag-carne{background:rgba(180,60,60,.1);color:#8a2020}
.tag-veg{background:rgba(107,124,74,.12);color:var(--olive)}
.tag-legumi{background:rgba(196,103,58,.12);color:var(--terracotta)}
.tag-integrale{background:rgba(42,31,20,.08);color:var(--deep)}
.ingredients-section{padding:0 1.5rem .9rem}
.ingredients-toggle{display:flex;align-items:center;gap:.45rem;cursor:pointer;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--terracotta);border:none;background:none;font-family:'Crimson Pro',serif;padding:.5rem 0;width:100%;text-align:left;transition:opacity .2s}
.ingredients-toggle:hover{opacity:.65}
.toggle-icon{font-size:1rem;transition:transform .28s;display:inline-block;line-height:1}
.toggle-icon.open{transform:rotate(45deg)}
.ingredients-list{display:none;padding-bottom:.8rem;animation:slideDown .22s ease}
.ingredients-list.open{display:block}
@keyframes slideDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.ingredients-list ul{list-style:none;display:flex;flex-direction:column;gap:.28rem}
.ingredients-list li{font-size:.9rem;display:flex;align-items:flex-start;gap:.45rem;line-height:1.4;font-weight:300}
.ing-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);margin-top:.45em;flex-shrink:0}
.macros{display:grid;grid-template-columns:repeat(4,1fr);background:var(--cream);border-top:1px solid var(--sand);padding:.75rem 1.5rem}
.macro{text-align:center}
.macro-val{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--deep);line-height:1}
.macro-label{font-size:.63rem;letter-spacing:.07em;text-transform:uppercase;opacity:.5;margin-top:.18rem;display:block}
.macro-approx{grid-column:1/-1;text-align:center;font-size:.65rem;font-style:italic;opacity:.45;padding:.2rem 0 .3rem;letter-spacing:.03em}
/* Card hint strip instead of button */
.card-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(201,168,76,.3);background:var(--appro-bg)}
.card-hint-text{flex:1;padding:.45rem .75rem;color:var(--appro);font-family:'Crimson Pro',serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase}
.card-print-btn{display:flex;align-items:center;gap:.3rem;padding:.45rem .8rem;border:none;border-left:1px solid rgba(201,168,76,.3);background:transparent;color:var(--navy);font-family:'Crimson Pro',serif;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .18s;flex-shrink:0}
.card-print-btn:hover{background:var(--navy);color:#fff}

.acc-mare{background:linear-gradient(90deg,var(--sea),#5a9bb0)}
.acc-legumi{background:linear-gradient(90deg,var(--terracotta),#d4845a)}
.acc-veg{background:linear-gradient(90deg,var(--olive),#8a9e60)}
.acc-pasta{background:linear-gradient(90deg,var(--gold),#d4b46c)}
.acc-insalata{background:linear-gradient(90deg,#6b9c7c,#8abf9c)}
.acc-zuppa{background:linear-gradient(90deg,#7c6b3a,#a08c50)}
.cat-mare{color:var(--sea)}.cat-legumi{color:var(--terracotta)}.cat-veg{color:var(--olive)}
.cat-pasta{color:#8a6d1a}.cat-insalata{color:#3a7c5a}.cat-zuppa{color:#7c6b3a}

/* ─── SCHEDE ──────────────────────────────────────── */
.schede-grid{max-width:1100px;margin:0 auto;padding:0 2rem 5rem;display:flex;flex-direction:column;gap:2.4rem}
.scheda{background:#fff;border-radius:4px;overflow:hidden;box-shadow:0 2px 20px rgba(42,31,20,.07);opacity:0;animation:fadeUp .5s ease forwards}
.scheda-header{padding:1.1rem 1.6rem;display:flex;align-items:center;gap:1rem;border-bottom:3px solid var(--navy)}
.scheda-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--navy);opacity:.25;line-height:1;flex-shrink:0;min-width:2.2rem}
.scheda-title-block{flex:1}
.scheda-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:400;color:var(--navy);line-height:1.25}
.scheda-chef{font-size:.8rem;font-style:italic;opacity:.55;margin-top:.15rem}
.scheda-body{display:grid;grid-template-columns:1fr 1fr}
@media(max-width:700px){.scheda-body{grid-template-columns:1fr}}
.scheda-cell{padding:1rem 1.4rem;border-right:1px solid var(--sky2);border-bottom:1px solid var(--sky2)}
.scheda-cell:nth-child(2n){border-right:none}
.scheda-cell.full{grid-column:1/-1;border-right:none}
.scheda-cell-label{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);font-weight:400;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem}
.scheda-cell-content{font-size:.92rem;line-height:1.6;font-weight:300}
.scheda-cell.allergeni .scheda-cell-content{color:var(--aller);font-weight:400;background:var(--peach);border-radius:3px;padding:.5rem .7rem;font-size:.88rem}
.scheda-cell.motiv .scheda-cell-content{color:var(--motiv);font-weight:300;background:var(--mint);border-radius:3px;padding:.6rem .8rem;font-size:.88rem;line-height:1.65}
.scheda-cell.cottura .scheda-cell-content{color:#5D4037;font-weight:300;background:#FBF7F0;border-radius:3px;padding:.6rem .8rem;font-size:.88rem;line-height:1.65;border-left:3px solid var(--gold)}
.scheda-cell.antitumorale .scheda-cell-content{color:var(--purple);font-weight:300;background:var(--purple-bg);border-radius:3px;padding:.6rem .8rem;font-size:.88rem;line-height:1.65}
.scheda-cell.stagione .scheda-cell-content{font-style:italic;opacity:.7;font-size:.88rem}
.scheda-cell.approfondimento .scheda-cell-content{color:var(--appro);font-weight:300;background:var(--appro-bg);border-radius:3px;padding:.6rem .8rem;font-size:.88rem;line-height:1.65;border-left:3px solid var(--gold)}
.ing-chips{display:flex;flex-wrap:wrap;gap:.35rem}
.ing-chip{background:var(--sky);color:var(--navy);font-size:.75rem;padding:.2rem .55rem;border-radius:2px;line-height:1.4;font-weight:300}
.ing-chip.dop{background:rgba(201,168,76,.2);color:#7a5c10}
.ing-chip.igp{background:rgba(58,107,124,.15);color:var(--sea)}
.ing-chip.km0{background:rgba(107,124,74,.18);color:var(--olive)}
.macros-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--cream);border-top:1px solid var(--sky2)}
.macros-row .macro{text-align:center;padding:.7rem .5rem}

/* ─── MODAL ───────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(42,31,20,.55);z-index:999;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:4px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-close{float:right;margin:1rem 1.2rem 0 0;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--deep);opacity:.5;transition:opacity .2s;line-height:1}
.modal-close:hover{opacity:1}

/* ─── APPROFONDIMENTO BADGE in card ──────────────────── */
.appro-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.68rem;letter-spacing:.09em;text-transform:uppercase;background:var(--appro-bg);color:var(--appro);border:1px solid rgba(201,168,76,.4);padding:.22rem .6rem;border-radius:2px;margin-top:.4rem;font-weight:400}

footer{text-align:center;padding:1.8rem;font-size:.73rem;letter-spacing:.1em;text-transform:uppercase;opacity:.4}

/* ─── SDG ─────────────────────────────────────────── */
.sdg-section{padding:.9rem 1.4rem 1rem;border-top:1px solid var(--sky2);background:#f9fafc}
.sdg-section-label{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#1a3a5c;font-weight:400;margin-bottom:.7rem;display:flex;align-items:center;gap:.4rem}
.sdg-grid{display:flex;flex-wrap:wrap;gap:.6rem}
.sdg-card{display:flex;gap:.6rem;align-items:flex-start;background:#fff;border-radius:3px;border:1px solid #dce4f0;padding:.55rem .7rem;flex:1;min-width:260px}
.sdg-badge{flex-shrink:0;width:42px;height:42px;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;line-height:1.15;text-align:center}
.sdg-text{flex:1}
.sdg-title{font-size:.78rem;font-weight:600;color:#1a3a5c;margin-bottom:.18rem;line-height:1.3}
.sdg-desc{font-size:.8rem;line-height:1.55;color:#2a3a50;font-weight:300}
/* SDG colors */
.sdg-1{background:#e5243b}.sdg-2{background:#dda63a}.sdg-3{background:#4c9f38}
.sdg-4{background:#c5192d}.sdg-5{background:#ff3a21}.sdg-6{background:#26bde2}
.sdg-7{background:#fcc30b}.sdg-8{background:#a21942}.sdg-9{background:#fd6925}
.sdg-10{background:#dd1367}.sdg-11{background:#fd9d24}.sdg-12{background:#bf8b2e}
.sdg-13{background:#3f7e44}.sdg-14{background:#0a97d9}.sdg-15{background:#56c02b}
.sdg-16{background:#00689d}.sdg-17{background:#19486a}

@media(max-width:600px){
  .cards-grid,.schede-grid{padding:0 1rem 3rem}
  .site-header{padding:2.5rem 1rem 1.2rem}
  #editor-sidebar{width:100vw}
}

/* ─── NEW SECTIONS ─────────────────────────────────── */
:root {
  --coral: #C0392B; --coral-bg: #FDEDEC;
  --adapt-bg: #F4F6F7; --adapt-border: #AEB6BF;
  --haccp-head: #2C3E50; --haccp-ccp: #E74C3C; --haccp-ok: #27AE60;
}
.scheda-cell.diabete .scheda-cell-content {
  color:var(--coral);font-weight:300;background:var(--coral-bg);border-radius:3px;
  padding:.6rem .8rem;font-size:.88rem;line-height:1.65;border-left:3px solid var(--coral);
}
.adapt-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.6rem;margin-top:.4rem}
.adapt-card {background:#fff;border:1px solid var(--adapt-border);border-radius:3px;padding:.7rem .9rem}
.adapt-label {font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:.3rem;display:block}
.adapt-text {font-size:.83rem;line-height:1.55;font-weight:300}
.adapt-vegan .adapt-label {color:#27AE60}
.adapt-lattosio .adapt-label {color:#8E44AD}
.adapt-celiaci .adapt-label {color:#D35400}
.adapt-halal .adapt-label {color:#1A5276}
.adapt-kosher .adapt-label {color:#7D6608}

/* HACCP */
.haccp-flow {display:flex;flex-direction:column;gap:0}
.haccp-step {display:flex;gap:.6rem;align-items:stretch}
.haccp-step-arrow {display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:28px}
.haccp-arrow-line {flex:1;width:2px;background:#AEB6BF;margin:0 auto}
.haccp-arrow-head {font-size:.8rem;color:#AEB6BF;line-height:1}
.haccp-box {flex:1;background:#fff;border:1px solid #AEB6BF;border-radius:3px;margin-bottom:4px;overflow:hidden}
.haccp-box.is-ccp {border-color:var(--haccp-ccp);border-width:2px}
.haccp-box-head {display:flex;align-items:center;gap:.5rem;padding:.5rem .8rem;background:#F2F3F4}
.haccp-box.is-ccp .haccp-box-head {background:#FDEDEC}
.haccp-step-name {font-size:.85rem;font-weight:600;flex:1;line-height:1.3}
.haccp-ccp-badge {font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;background:var(--haccp-ccp);color:#fff;padding:.15rem .5rem;border-radius:2px;flex-shrink:0}
.haccp-ok-badge {font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;background:var(--haccp-ok);color:#fff;padding:.15rem .5rem;border-radius:2px;flex-shrink:0}

   stagione:"Tutto l'anno (lenticchie secche; spigola fresca disponibile tutto l'anno)",
   approfondimento:{nome:"Olio EVO Penisola Sorrentina DOP",marchio:"DOP",descrizione:"Prodotto esclusivamente dai comuni della Penisola Sorrentina (Sorrento, Massa Lubrense, Sant'Agnello, Piano di Sorrento, Meta, Vico Equense) con olive delle varietà Minucciola e Rotondella, coltivate sui terrazzamenti a picco sul mare. Il disciplinare DOP garantisce raccolta manuale o meccanica con pettini entro il 31 gennaio, frangitura entro 24 ore e acidità ≤ 0,5%. Il profilo sensoriale è caratteristico: fruttato verde con note di erba e mandorla, amaro e piccante equilibrati — segnale dell'alto contenuto di polifenoli (oleuropeina, idrossitirosolo) con comprovata azione antiossidante e anti-infiammatoria."},
   ingChips:[{t:"Spigola km0",c:"km0"},{t:"Lenticchie rosse",c:""},{t:"Rosmarino fresco",c:""},{t:"Olio EVO DOP Sorrento",c:"dop"},{t:"Brodo vegetale",c:""}]},

  {id:5,numero:6,title:"Insalata di Riso con Tonno, Mais e Olive",chef:"Vinaccia",cat:"insalata",catLabel:"Insalate di Cereali",accent:"acc-insalata",
   tags:[["mare","tag-mare"]],porzioni:"Dosi per 4 persone",
   ingredients:["200 g riso integrale o parboiled","160 g tonno al naturale (MSC pesca sostenibile)","80 g mais dolce","60 g olive nere di Gaeta DOP","pomodorini freschi","cetriolini","olio EVO penisola sorrentina","sale","origano"],
   macros:{kcal:370,prot:20,carb:52,grassi:9},note:"Classico estivo, ottimo da preparare in anticipo",
   allergeni:"Pesce (tonno)",
   procedimento:"Cuocere il riso in acqua salata, scolare e raffreddare. Sgocciolare tonno e mais. Tagliare pomodorini e cetriolini. Mescolare tutti gli ingredienti. Condire con olio EVO, origano e sale. Servire freddo.",
   motivazione:"Il tonno al naturale è proteina magra di alto valore biologico con acidi grassi essenziali Omega-3. Le olive di Gaeta DOP apportano acidi grassi monoinsaturi (oleico) con effetto cardioprotettivo. Usando riso integrale si aumenta l'apporto di fibre e si abbassa l'indice glicemico rispetto al riso bianco.",
   cottura:"Cottura del riso in acqua bollente, poi raffreddamento rapido. Il raffreddamento del riso genera amido resistente (RS3), che fermentato nel colon produce butirrato, un acido grasso protettivo per le cellule intestinali (effetto prebiotico). Gli altri ingredienti vengono usati a crudo o già pronti, preservando tutti i nutrienti termolabili. L'olio EVO aggiunto a freddo mantiene inalterati i polifenoli.",
   antitumorale:"Le olive di Gaeta DOP sono ricche di idrossitirosolo e oleuropeina, polifenoli tra i più potenti antiossidanti naturali con attività antitumorale su diversi tipi di cellule cancerose. Gli Omega-3 del tonno contrastano l'infiammazione cronica. Il riso integrale contiene lignani e acido ferulico che riducono i livelli di estrogeni circolanti, abbassando il rischio di tumori ormono-dipendenti.",
   stagione:"Estate (piatto freddo); ingredienti principali disponibili tutto l'anno",
   approfondimento:{nome:"Olive di Gaeta DOP",marchio:"DOP",descrizione:"Le olive di Gaeta DOP (città sul confine tra Lazio e Campania, storicamente legata alla cultura culinaria campana) sono della varietà Itrana, raccolte a maturazione avanzata (dicembre-gennaio) quando la buccia vira dal verde al nero-violaceo. La lavorazione tradizionale prevede la 'bollitura' o la conservazione in salamoia senza additivi chimici. Il colore scuro e la lavorazione naturale garantiscono il massimo contenuto di idrossitirosolo (fino a 300 mg/kg), uno degli antiossidanti più potenti del mondo vegetale, con effetti documentati sulla riduzione del rischio cardiovascolare e antitumorale — effetto riconosciuto anche dall'EFSA con un health claim ufficiale."},
   ingChips:[{t:"Riso integrale",c:""},{t:"Tonno al naturale",c:""},{t:"Olive Gaeta DOP",c:"dop"},{t:"Pomodorini km0",c:"km0"},{t:"Olio EVO",c:"km0"}]},

  {id:6,numero:7,title:"Orzotto Integrale al Limone della Costiera e Alici di Cetara",chef:"Cardillo",cat:"pasta",catLabel:"Cereali Integrali",accent:"acc-pasta",
   tags:[["integrale","tag-integrale"],["mare","tag-mare"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["300 g orzo integrale","8 alici di Cetara sotto sale (presidio Slow Food)","1 limone Costa d'Amalfi IGP","zucchine (stagione)","asparagi o verdure di stagione","aglio","olio EVO penisola sorrentina DOP","prezzemolo","pepe"],
   macros:{kcal:395,prot:18,carb:60,grassi:10},note:"Le alici di Cetara: presidio Slow Food, sapore intenso e minerale",
   allergeni:"Glutine (orzo) · Pesce (alici)",
   procedimento:"Ammollare l'orzo integrale 4 ore, cuocere come un risotto aggiungendo brodo caldo a mestoli per 35–40 min. Dissalare le alici, sfilettarle. Saltare le verdure in padella con aglio e olio. A cottura ultimata, mantecare con scorza di limone, succo, alici spezzettate e verdure. Prezzemolo fresco e olio EVO a crudo.",
   motivazione:"L'orzo integrale è il cereale con il più alto contenuto di beta-glucani (fibre solubili) che riducono colesterolo LDL e glicemia post-prandiale. Le alici di Cetara sono ricche di acidi grassi essenziali Omega-3, calcio e vitamina D. Il limone della Costiera apporta vitamina C e polifenoli antiossidanti.",
   cottura:"Tecnica del risotto applicata all'orzo integrale: aggiunta graduale di brodo caldo a mestoli e mantecatura finale. Questo metodo garantisce la massima cessione dei beta-glucani dell'orzo nel liquido di cottura. Le alici vengono dissalate e aggiunte a fine cottura — senza ulteriore calore — per preservare gli Omega-3, molto sensibili all'ossidazione termica.",
   antitumorale:"I beta-glucani dell'orzo integrale stimolano il sistema immunitario, aumentando l'attività delle cellule NK (Natural Killer) che eliminano cellule tumorali. Gli Omega-3 delle alici di Cetara inibiscono la sintesi di prostaglandine pro-infiammatorie. Il limonene del limone amalfitano è uno dei terpeni più studiati in oncologia: inibisce un enzima chiave nella crescita di molti tumori.",
   stagione:"Primavera-estate (asparagi marzo-maggio; zucchine maggio-settembre)",
   approfondimento:{nome:"Alici di Cetara — Presidio Slow Food",marchio:"Presidio Slow Food",descrizione:"Cetara, piccolo borgo marinaro sulla Costiera Amalfitana (SA), è famosa in tutto il mondo per le sue alici sotto sale e per la 'colatura di alici', ottenuta dalla maturazione prolungata (12–18 mesi) in terzigni (barili di legno) con sale marino. Il Presidio Slow Food tutela la filiera tradizionale: pesca con lampara notturna da aprile a luglio, salagione immediata con sale marino di Sicilia o di Trapani, pressatura in terzigni di castagno. Il profilo nutrizionale è eccezionale: 20 g di proteine/100 g, 3 g di Omega-3 (EPA+DHA) per 100 g — il doppio del salmone d'allevamento — vitamina D, calcio e iodio. La colatura di alici è il discendente diretto del 'garum' romano."},
   ingChips:[{t:"Orzo integrale",c:""},{t:"Alici Cetara Slow Food",c:"km0"},{t:"Limone Costiera IGP",c:"igp"},{t:"Zucchine km0",c:"km0"},{t:"Olio EVO",c:"km0"}]},

  {id:7,numero:8,title:"Pasta Integrale con Piselli",chef:"Cappiello",cat:"pasta",catLabel:"Pasta Integrale",accent:"acc-pasta",
   tags:[["integrale","tag-integrale"],["veg","tag-veg"],["legumi","tag-legumi"]],porzioni:"Dosi per 4 persone",
   ingredients:["320 g pasta integrale (mezze maniche)","300 g piselli freschi (Piana del Sele)","1 cipolla dorata","olio EVO campano","brodo vegetale","parmigiano (20 g)","sale","pepe","menta fresca"],
   macros:{kcal:380,prot:16,carb:62,grassi:8},note:"Con i piselli freschi di stagione il sapore cambia completamente",
   allergeni:"Glutine (pasta) · Latte (parmigiano)",
   procedimento:"Soffriggere la cipolla in olio EVO. Aggiungere i piselli, bagnare con brodo e cuocere 10–12 min. Schiacciare parte dei piselli per creare una crema parziale. Cuocere la pasta al dente, mantecare con i piselli e acqua di cottura. Finire con parmigiano e menta.",
   motivazione:"I piselli sono legumi ricchi di proteine (6 g/100 g) e fibre. La pasta integrale ha un indice glicemico inferiore del 30% rispetto alla pasta raffinata. L'abbinamento cereale integrale + legume garantisce un profilo aminoacidico completo. Piatto ipocalorico e ad alta densità nutrizionale.",
   cottura:"Soffritto leggero della cipolla in olio EVO: la cottura a fuoco moderato libera i composti solforati e i flavonoidi, rendendoli più biodisponibili. I piselli vengono cotti brevemente (10–12 min) per preservarne il colore e la vitamina C. La mantecatura con acqua di cottura della pasta crea una salsa leggera senza aggiungere grassi.",
   antitumorale:"I piselli contengono coumestani e isoflavonoidi, fitoestrogeni che modulano i recettori estrogenici riducendo il rischio di tumori ormono-dipendenti. Sono inoltre ricchi di vitamina K, che in studi recenti mostra effetti pro-apoptotici su cellule tumorali del fegato. Le fibre della pasta integrale e dei piselli aumentano la produzione di butirrato nel colon.",
   stagione:"Primavera (piselli freschi aprile-giugno); tutto l'anno con piselli surgelati",
   approfondimento:{nome:"Nocciola di Giffoni IGP",marchio:"IGP",descrizione:"Anche se questa ricetta non la include direttamente, la nocciola di Giffoni IGP è l'eccellenza frutticola dell'entroterra campano più vicino alla Piana del Sele, area da cui provengono i piselli della ricetta. A titolo di approfondimento sul territorio: Giffoni Valle Piana (SA) produce la nocciola Tonda di Giffoni, riconosciuta IGP dal 1997, considerata tra le migliori al mondo per aroma e resa in pasta. Conta clienti come Ferrero e Venchi. Tuttavia, per questa ricetta il prodotto di eccellenza del territorio sono i Piselli della Piana del Sele, coltivati nei ricchi terreni alluvionali del fiume Sele (SA) da cui si ottiene uno dei piselli più dolci e teneri d'Italia, apprezzati dai cuochi campani per la loro buccia sottile e il sapore erbaceo-dolce inconfondibile."},
   ingChips:[{t:"Pasta integrale",c:""},{t:"Piselli Piana del Sele",c:"km0"},{t:"Cipolla dorata",c:"km0"},{t:"Olio EVO",c:"km0"},{t:"Menta fresca",c:""}]},

  {id:8,numero:9,title:"Riso con Verdure Miste (Carciofi, Broccoli, Verza)",chef:"Milano",cat:"veg",catLabel:"Verdure & Cereali",accent:"acc-veg",
   tags:[["veg","tag-veg"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["300 g riso carnaroli","2 carciofi di Paestum IGP (stagione)","200 g cimette di broccoli (agro-sarnese)","150 g verza (stagione)","1 spicchio d'aglio","olio EVO","brodo vegetale","sale","pepe"],
   macros:{kcal:320,prot:10,carb:56,grassi:7},note:"Verdure invernali per un piatto ricco di fibre e antiossidanti",
   allergeni:"Nessun allergene principale (verificare il brodo utilizzato)",
   procedimento:"Pulire e tagliare le verdure. In padella rosolare l'aglio in olio EVO, aggiungere i carciofi, poi broccoli e verza. Tostare il riso separatamente, aggiungere brodo caldo e cuocere 16–18 min. Unire le verdure al riso a metà cottura. Regolare di sale.",
   motivazione:"I carciofi contengono cinarina che favorisce la funzione epatica e abbassa il colesterolo. I broccoli sono ricchi di sulforafano (anticancro) e vitamina C. La verza apporta glucosinolati e fibre. Piatto privo di grassi saturi, ricco di fibre e micronutrienti.",
   cottura:"Le verdure vengono saltate in padella con olio EVO a fuoco vivace (tecnica stir-fry veloce): questa cottura breve ad alta temperatura preserva la croccantezza e, soprattutto per i broccoli, mantiene attiva la mirosinasi, l'enzima necessario alla conversione del glucorafanino in sulforafano. Il riso viene tostato a secco prima di aggiungere il brodo.",
   antitumorale:"Questo piatto è uno dei più potenti in chiave oncologica. Il sulforafano dei broccoli è la molecola di origine alimentare più studiata in oncologia: attiva i geni soppressori tumorali e inibisce la proliferazione di cellule tumorali di seno, colon, prostata e polmone. La verza (famiglia Brassicaceae) contiene indolo-3-carbinolo che modula il metabolismo estrogenico. I carciofi sono ricchi di silimarina e luteolina.",
   stagione:"Autunno-inverno (carciofi ottobre-maggio; broccoli e verza ottobre-marzo)",
   approfondimento:{nome:"Carciofo di Paestum IGP",marchio:"IGP",descrizione:"Coltivato nella Piana del Sele, nei comuni di Capaccio-Paestum, Agropoli e Albanella (SA), in prossimità del sito UNESCO di Paestum. La varietà è il 'Tondo di Paestum', un ecotipo locale del Cynara cardunculus var. scolymus, caratterizzato da capolino rotondo, foglie tenere senza spine, colore verde-violaceo e sapore dolce con note erbacee. L'IGP è stata ottenuta nel 2011. Il terreno alluvionale pianeggiante, ben drenato e ricco di sostanza organica, e il microclima mite (protetto dai monti Alburni e Cilentani) creano condizioni ideali. È il carciofo più ricco di cinarina (acido 1,3-dicaffeoilchinico) in assoluto: fino a 8 g/kg di peso secco."},
   ingChips:[{t:"Riso carnaroli",c:""},{t:"Carciofi Paestum IGP",c:"igp"},{t:"Broccoli agro-sarnese",c:"km0"},{t:"Verza km0",c:"km0"},{t:"Olio EVO",c:"km0"}]},

  {id:9,numero:10,title:"Insalata di Farro, Pollo e Verdure di Stagione",chef:"Covino",cat:"insalata",catLabel:"Insalate di Cereali",accent:"acc-insalata",
   tags:[["carne","tag-carne"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["200 g farro semiperlato","250 g petto di pollo (filiera corta campana)","2 carote (agro-sarnese)","2 zucchine (stagione)","150 g pomodorini campani","basilico fresco","olio EVO","limone","sale","pepe"],
   macros:{kcal:360,prot:28,carb:42,grassi:9},note:"Bilanciato in macronutrienti, ideale come piatto unico",
   allergeni:"Glutine (farro)",
   procedimento:"Cuocere il farro in acqua salata 25 min, raffreddare. Cuocere il petto di pollo alla griglia, tagliare a cubetti. Scottare carote e zucchine in padella con poco olio 5 min (al dente). Mescolare farro, pollo, verdure e pomodorini. Condire con olio EVO, succo di limone, sale e basilico.",
   motivazione:"Piatto unico bilanciato: il farro fornisce carboidrati complessi con alto contenuto di fibre, il pollo è fonte proteica magra (22 g/100 g) con bassissimo contenuto di grassi saturi. Il bilanciamento macronutrienti è il principio cardine nella prevenzione dell'obesità.",
   cottura:"Il pollo viene cotto alla griglia senza grassi aggiunti. Attenzione a non carbonizzare la superficie: la carbonizzazione produce ammine eterocicliche potenzialmente cancerogene. Le verdure vengono scottate brevemente al dente per preservarne vitamine e clorofilla. Il farro viene raffreddato dopo la cottura per aumentare l'amido resistente.",
   antitumorale:"Il farro contiene lignani, fitoestrogeni che riducono i livelli di estrogeni liberi nel sangue. Le zucchine apportano luteina e zeaxantina, carotenoidi antiossidanti. Le carote sono ricche di betacarotene (pro-vitamina A), associato alla riduzione del rischio di tumori di polmone ed esofago. I pomodorini campani aggiungono licopene.",
   stagione:"Estate (zucchine, pomodorini); carote disponibili tutto l'anno",
   approfondimento:{nome:"Pomodorino del Piennolo del Vesuvio DOP",marchio:"DOP",descrizione:"Anche in questa insalata i pomodorini campani rappresentano un ingrediente di eccellenza territoriale. I pomodorini del Piennolo del Vesuvio DOP, coltivati nei comuni dell'area vesuviana (Boscotrecase, Ottaviano, Torre Annunziata), sono forse il prodotto orticolo campano più iconico. La particolarità del 'piennolo' (il grappolo appeso) è che la conservazione post-raccolta — appesi in locali asciutti e ventilati — continua la maturazione lentamente, aumentando ulteriormente la concentrazione di licopene e zuccheri. Possono essere conservati fino a marzo-aprile dell'anno successivo alla raccolta (agosto-settembre), rendendoli disponibili in ogni stagione. Il disciplinare DOP tutela le varietà 'Fiaschella', 'Lampadina', 'Patanara', 'Principe Borghese' e 'Re Umberto'."},
   ingChips:[{t:"Farro semiperlato",c:""},{t:"Pollo filiera corta",c:"km0"},{t:"Carote agro-sarnese",c:"km0"},{t:"Zucchine km0",c:"km0"},{t:"Pomodorini campani",c:"km0"}]},

  {id:10,numero:11,title:"Linguine di Gragnano al Limone di Sorrento e Burro alle Erbe",chef:"Di Leva",cat:"pasta",catLabel:"Pasta",accent:"acc-pasta",
   tags:[["km0","tag-km0"],["IGP","tag-dop"]],porzioni:"Dosi per 4 persone",
   ingredients:["320 g linguine di Gragnano IGP","2 limoni di Sorrento IGP (scorza e succo)","40 g burro di qualità","timo fresco","erba cipollina","prezzemolo","parmigiano reggiano (20 g)","sale","pepe bianco","1 cucchiaio olio EVO"],
   macros:{kcal:450,prot:13,carb:66,grassi:17},note:"La scorza del limone di Sorrento è profumatissima e fondamentale",
   allergeni:"Glutine (pasta) · Latte (burro, parmigiano)",
   procedimento:"Cuocere le linguine al dente. Sciogliere il burro a fuoco basso con timo ed erba cipollina. Aggiungere scorza e succo di limone di Sorrento. Mantecare pasta con il burro alle erbe e acqua di cottura per la cremosità. Completare con parmigiano e prezzemolo.",
   motivazione:"Il limone di Sorrento IGP è ricco di vitamina C, limonene e flavonoidi con proprietà antinfiammatorie e antiossidanti che contrastano lo stress ossidativo. La pasta di Gragnano IGP ha un indice glicemico più basso. Il burro è ridotto a 40 g per 4 porzioni in favore dell'olio EVO.",
   cottura:"Cottura della pasta al dente: la struttura dell'amido ancora parzialmente compatta riduce l'indice glicemico rispetto alla pasta scotta. Il burro viene sciolto a fuoco bassissimo con le erbe aromatiche: evita di bruciare i composti volatili. Il limone viene aggiunto sempre fuori fuoco: il calore degraderebbe il limonene e la vitamina C.",
   antitumorale:"Il limonene, abbondantissimo nella scorza del limone di Sorrento IGP, è tra i composti naturali più promettenti in campo oncologico: inibisce la proliferazione tumorale in modelli animali di tumore al seno, colon e fegato. La vitamina C del limone fresco protegge le cellule dai radicali liberi e inibisce la formazione di nitrosammine cancerogene. Il timo contiene timolo e carvacrolo con attività citotossica.",
   stagione:"Tutto l'anno (limoni di Sorrento); erbe aromatiche fresche in primavera-estate",
   approfondimento:{nome:"Limone di Sorrento IGP",marchio:"IGP",descrizione:"Questo piatto è il manifesto del Limone di Sorrento IGP: la scorza (il 'profumo' inimitabile) è l'ingrediente protagonista. La varietà Femminello Ovale di Sorrento, coltivata sui terrazzamenti della penisola, è caratterizzata da una buccia eccezionalmente spessa (8–12 mm) e ricchissima di oli essenziali: il limonene ne costituisce il 65–75%, seguito da beta-pinene, gamma-terpinene e linalolo. Queste caratteristiche lo rendono l'ingrediente base del Limoncello di Sorrento (IGP), degli sfusati amalfitani e della 'Delizia al limone', dolce tipico sorrentino. La stagione di massima produzione è marzo-aprile ('primofiore') e ottobre-novembre, ma il disciplinare IGP garantisce la disponibilità tutto l'anno grazie alle diverse fioriture."},
   ingChips:[{t:"Gragnano IGP",c:"igp"},{t:"Limone Sorrento IGP",c:"igp"},{t:"Burro (ridotto)",c:""},{t:"Erbe aromatiche",c:""},{t:"Olio EVO",c:"km0"}]},

  {id:11,numero:12,title:"Zuppa di Lenticchie, Carciofi, Cicoria e Crostini Integrali",chef:"Russo",cat:"legumi",catLabel:"Zuppe & Legumi",accent:"acc-zuppa",
   tags:[["legumi","tag-legumi"],["integrale","tag-integrale"],["veg","tag-veg"]],porzioni:"Dosi per 4 persone",
   ingredients:["200 g lenticchie verdi","2 carciofi di Paestum IGP","150 g cicoria selvatica (km0, campagna campana)","2 fette pane integrale (crostini)","1 spicchio d'aglio","rosmarino","olio EVO","brodo vegetale","sale","peperoncino"],
   macros:{kcal:290,prot:17,carb:44,grassi:7},note:"Piatto povero della tradizione contadina campana, ricchissimo di nutrienti",
   allergeni:"Glutine (pane integrale)",
   procedimento:"Ammollare le lenticchie 30 min. Rosolare aglio e rosmarino in olio EVO. Aggiungere lenticchie, carciofi tagliati, brodo. Cuocere 35–40 min. A fine cottura aggiungere la cicoria sbollentata e strizzata. Regolare di sale e peperoncino. Servire con crostini integrali tostati e olio EVO a crudo.",
   motivazione:"Zuppa ad altissima densità nutritiva e minima densità calorica. Le lenticchie hanno un IG molto basso (21). I carciofi contengono inulina (fibra prebiotica) che migliora la flora intestinale e riduce la glicemia. La cicoria è ipocalorica (17 kcal/100 g) e ricca di vitamina K, folati e antiossidanti.",
   cottura:"Cottura lenta in pentola (zuppa): la lunga cottura delle lenticchie e dei carciofi (35–40 min) intenerisce le fibre vegetali rendendole più digeribili senza distruggerne i flavonoidi, stabili al calore. La cicoria viene sbollentata separatamente e strizzata: questo passaggio riduce l'amaro eccessivo e abbatte gli ossalati, rendendo i minerali più biodisponibili. L'olio EVO viene versato sempre a crudo nel piatto finale.",
   antitumorale:"La cicoria selvatica contiene lactucopicrina e acido cicorico con spiccata azione pro-apoptotica su cellule tumorali. I carciofi sono ricchi di silimarina, apigenina e luteolina: tre flavonoidi con documentata attività di inibizione della cancerogenesi epatica e del colon. Le lenticchie apportano folati che proteggono l'integrità del DNA.",
   stagione:"Autunno-inverno (carciofi e cicoria selvatica ottobre-aprile)",
   approfondimento:{nome:"Carciofo di Paestum IGP",marchio:"IGP",descrizione:"Il Carciofo di Paestum IGP compare per la seconda volta in questa selezione a conferma della sua centralità nella cucina campana salutistica. In questa zuppa invernale, il carciofo viene utilizzato in modo diverso rispetto al risotto: stufato lentamente nel brodo, libera l'inulina (fino a 20 g/100 g di peso secco) — la fibra prebiotica per eccellenza — nel liquido di cottura. L'inulina non viene digerita nell'intestino tenue ma fermenta nel colon, nutrendo i batteri benefici (Bifidobacterium, Lactobacillus) e producendo butirrato, un acido grasso a catena corta con documentata azione epato-protettiva e antiproliferativa. La cinarina, invece, stimola la produzione biliare aumentando il metabolismo lipidico."},
   ingChips:[{t:"Lenticchie verdi",c:""},{t:"Carciofi Paestum IGP",c:"igp"},{t:"Cicoria selvatica km0",c:"km0"},{t:"Pane integrale",c:""},{t:"Olio EVO",c:"km0"}]},

  {id:12,numero:13,title:"Pasta alla Nerano Integrale",chef:"D'Esposito",cat:"pasta",catLabel:"Pasta Integrale",accent:"acc-pasta",
   tags:[["integrale","tag-integrale"],["veg","tag-veg"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["320 g pasta integrale (paccheri o spaghetti)","500 g zucchine di Nerano (stagione, km0)","olio di semi arachide (per friggere, controllato)","provolone del Monaco DOP (40 g)","parmigiano reggiano (20 g)","basilico fresco campano","aglio","sale","pepe nero"],
   macros:{kcal:480,prot:18,carb:62,grassi:19},note:"Variante integrale dell'iconica ricetta della costiera sorrentina",
   allergeni:"Glutine (pasta) · Latte (provolone del Monaco, parmigiano)",
   procedimento:"Tagliare le zucchine a rondelle sottili, friggerle fino a doratura, scolare su carta assorbente. Frullare metà delle zucchine con acqua di cottura per formare una crema. Cuocere la pasta al dente. Mantecare con la crema di zucchine, rondelle intere, provolone del Monaco a julienne, parmigiano e basilico fresco.",
   motivazione:"La versione integrale riduce significativamente l'indice glicemico grazie alla fibra della farina integrale. Le zucchine sono ipocaloriche (17 kcal/100 g), ricche di potassio e vitamina C. Il provolone del Monaco DOP è usato in quantità moderata per il sapore senza eccedere in grassi saturi.",
   cottura:"La frittura delle zucchine in olio di semi di arachide ad alta temperatura (180°C) crea una crosta che limita l'assorbimento di olio. Scolare subito su carta assorbente abbatte il grasso assorbito del 30–40%. Frullare metà delle zucchine con acqua di cottura permette di ottenere cremosità senza aggiungere panna. Il provolone del Monaco viene aggiunto fuori fuoco nella mantecatura finale.",
   antitumorale:"Le zucchine contengono cucurbitacine, composti triterpenici con accertata attività antitumorale su cellule di leucemia e tumore al seno, e luteina con funzione antiossidante. Il basilico fresco apporta eugenolo che inibisce l'angiogenesi tumorale. L'aglio è uno degli alimenti anticancro meglio documentati in letteratura scientifica: i suoi organosolfurati inducono l'apoptosi in numerose linee cellulari tumorali.",
   stagione:"Estate (zucchine di Nerano maggio-settembre, stagione ottimale)",
   approfondimento:{nome:"Provolone del Monaco DOP",marchio:"DOP",descrizione:"Formaggio emblema della Penisola Sorrentina e dei Monti Lattari, prodotto esclusivamente in 15 comuni tra cui Vico Equense, Agerola, Casola di Napoli, Lettere e Gragnano. La denominazione 'Monaco' deriva probabilmente dai monaci cistercensi che ne perfezionarono la tecnica, oppure (versione più romantica) dai cappucci cerati che i produttori indossavano durante il trasporto al mercato di Napoli via mare. Il disciplinare DOP garantisce latte crudo intero di vacca Agerolese (razza autoctona dei Lattari, a rischio estinzione), pasta filata semidura, stagionatura minima di 6 mesi (fino a 24 mesi per la versione 'vecchia'). Il profilo aromatico è intenso, con note di frutta secca, fieno e un piccante persistente che si sviluppa con la stagionatura. L'enzima lipasi naturale del latte crudo (non pastorizzato) sviluppa aromi impossibili da replicare con latte trattato termicamente."},
   ingChips:[{t:"Pasta integrale",c:""},{t:"Zucchine Nerano km0",c:"km0"},{t:"Provolone Monaco DOP",c:"dop"},{t:"Basilico campano",c:"km0"},{t:"Parmigiano",c:""}]},
  {id:13,numero:14,title:"Scialatielli rivisitati al Piennolo con melanzane croccanti",chef:"Apreda",cat:"pasta",catLabel:"Pasta Fresca",accent:"acc-pasta",tags:[["DOP","tag-dop"],["km0","tag-km0"],["veg","tag-veg"]],porzioni:"Dosi per 4 persone (80 g/pax)",ingredients:["Semola rimacinata 210 g (⚠ glutine)","Acqua 110 ml","Pomodorini del Piennolo del Vesuvio DOP 500 g","Melanzane locali 200 g","Basilico fresco 20 g","Aglio 2 spicchi","Olio extravergine d'oliva Sorrento DOP 40 ml","Olio di semi di girasole alto oleico 500 ml (frittura)","Sale e pepe q.b."],macros:{kcal:420,prot:10,carb:62,grassi:16},note:"Gli scialatielli sono pasta fresca tipica della Costiera Amalfitana. Melanzane di stagione: giugno–ottobre.",allergeni:"Glutine (semola rimacinata)",procedimento:"Impastare semola e acqua fino a ottenere un impasto liscio ed elastico; far riposare 30 min avvolto. Stendere e tagliare gli scialatielli a mano (circa 25 cm, sezione rettangolare). Tagliare le melanzane a dadini, salarle, sciacquarle e asciugarle. Friggerle in olio di semi alto oleico a 175°C finche dorate e croccanti; scolare su carta assorbente. In padella soffriggere aglio in olio EVO DOP, aggiungere i pomodorini del Piennolo schiacciati a mano e cuocere 12-15 min a fuoco medio; regolare di sale. Cuocere la pasta in abbondante acqua salata, scolare al dente e mantecare nella salsa. Impiattare con le melanzane croccanti e foglie di basilico fresco.",motivazione:"Il Pomodorino del Piennolo DOP e tra i pomodori con la piu alta concentrazione di licopene (fino a 25 mg/100 g), potente antiossidante. La semola rimacinata apporta carboidrati complessi con IG inferiore alla pasta di grano tenero. Le melanzane contengono nasunico (antocianina) e acido clorogenico con spiccata azione antinfiammatoria. L'olio EVO DOP Sorrento e ricco di polifenoli (oleocantale, oleuropeina) a effetto cardioprotettivo.",cottura:"Frittura melanzane a 175°C (olio alto oleico, stabile termicamente). Cottura pasta al dente per preservare l'indice glicemico. Salsa pomodorino a fuoco medio-basso: la cottura aumenta la biodisponibilita del licopene del 35%.",antitumorale:"Il licopene dei pomodorini del Piennolo DOP e uno dei carotenoidi piu studiati in oncologia. Le melanzane contengono nasunico con effetto antiproliferativo documentato. Il basilico apporta eugenolo che inibisce l'angiogenesi tumorale. L'aglio contribuisce con allicina e organosolfurati.",stagione:"Pomodorino del Piennolo DOP: tutto l'anno (conservazione in grappolo). Melanzane: giugno-ottobre (stagionalita locale campana).",approfondimento:{nome:"Pomodorino del Piennolo del Vesuvio DOP",marchio:"DOP",descrizione:"Il Pomodorino del Piennolo del Vesuvio ha ottenuto la DOP nel 2009. Si coltiva sulle pendici del Vesuvio in terreni vulcanici. Il nome piennolo deriva dal dialettale appendere: i grappoli vengono legati e appesi in locali freschi dove maturano lentamente durante l'inverno senza refrigerazione. Il frutto contiene circa 25 mg/100 g di licopene, 3 volte superiore ai pomodori comuni, e una acidita naturale che lo rende eccellente per la conservazione."},ingChips:[{t:"Piennolo DOP",c:"dop"},{t:"Olio EVO DOP Sorrento",c:"dop"},{t:"Semola rimacinata",c:""},{t:"Melanzane km0",c:"km0"},{t:"Basilico km0",c:"km0"}]},
  {id:14,numero:15,title:"Tonno scottato in crosta di sesamo con rucola, pomodori e aria al limone",chef:"Pane",cat:"mare",catLabel:"Mare & Pesce",accent:"acc-mare",tags:[["mare","tag-mare"],["IGP","tag-dop"],["DOP","tag-dop"]],porzioni:"Dosi per 2 persone",ingredients:["Filetto di tonno freschissimo (abbattuto) 2 x 150 g","Sesamo bianco e nero q.b. (⚠ sesamo)","Rucola fresca km0 60 g","Pomodori maturi di stagione km0 200 g","Limone di Sorrento IGP 1 medio (scorza + succo)","Olio EVO Penisola Sorrentina DOP q.b.","Lecitina di soia 2 g (per l'aria)","Acqua 100 ml","Sale marino e pepe q.b."],macros:{kcal:310,prot:38,carb:8,grassi:14},note:"Il Limone di Sorrento IGP e l'Olio EVO DOP garantiscono qualita certificata e valorizzazione del patrimonio agroalimentare locale. Il tonno DEVE essere abbattuto a -18 gradi C per almeno 24h (Reg. CE 853/2004).",allergeni:"Pesce (tonno) · Sesamo",procedimento:"Preparare l'aria al limone: frullare con minipimer il succo di limone IGP, acqua e lecitina di soia; raccogliere la schiuma con cucchiaio. Massaggiare il filetto di tonno (abbattuto) con olio EVO DOP e ricoprirlo con sesamo su tutti i lati. Scottare in padella antiaderente caldissima 45-60 secondi per lato (esterno sigillato, interno rosa). Far riposare 1 min. Condire rucola e pomodori con olio EVO DOP, scorza di limone IGP, sale e pepe. Affettare il tonno in medaglioni. Impiattare: base di rucola e pomodori, medaglioni di tonno, aria al limone in ultimo.",motivazione:"Il tonno e fonte eccellente di proteine complete (27 g/100 g) e Omega-3 EPA/DHA con documentata azione antinfiammatoria e cardioprotettiva. La scottatura breve conserva la totalita dei nutrienti termolabili. Il sesamo apporta sesaminolo e sesamolina con azione antiossidante. Il Limone di Sorrento IGP e tra le fonti piu ricche di limonene, vitamina C e bioflavonoidi.",cottura:"SCOTTATURA BREVE: 45-60 sec per lato a fuoco vivace. Il tonno DEVE essere stato abbattuto a -18 gradi C per almeno 24h (eliminazione Anisakis simplex, Reg. CE 853/2004). L'aria al limone viene preparata a temperatura ambiente — il calore degraderebbe il limonene volatile e la vitamina C termolabile.",antitumorale:"Il limonene della scorza del Limone di Sorrento IGP e tra i composti naturali piu studiati in oncologia: inibisce la farnesil-proteina transferasi. I pomodori apportano licopene e betacarotene. Il sesamo contiene lignani (sesaminolo, sesamolina) con documentata attivita antiproliferativa.",stagione:"Tonno: giugno-settembre (pesca Mediterraneo). Pomodoro e rucola: primavera-estate. Limone di Sorrento IGP: tutto l'anno, ottimale in inverno-primavera.",approfondimento:{nome:"Limone di Sorrento IGP",marchio:"IGP",descrizione:"Il Limone di Sorrento IGP e tra gli agrumi piu pregiati al mondo per la qualita della scorza. La cultivar Femminello Sorrentino produce frutti quasi tutto l'anno. La scorza, spessa fino a 9 mm, contiene ghiandole oleifere che rilasciano profumo intenso al minimo sfregamento. Il disciplinare IGP impone la raccolta manuale. La sua presenza garantisce qualita certificata, tracciabilita e tutela delle produzioni locali, elementi fondamentali nella valorizzazione del patrimonio agroalimentare italiano."},ingChips:[{t:"Tonno abbattuto km0",c:"km0"},{t:"Limone Sorrento IGP",c:"igp"},{t:"Olio EVO DOP",c:"dop"},{t:"Sesamo",c:""},{t:"Rucola km0",c:"km0"},{t:"Pomodori km0",c:"km0"}]},
  {id:15,numero:16,title:"Insalatina di seppia con carpaccio di zucchine, pesto alle noci e arancia e limone a vivo",chef:"Valestra",cat:"mare",catLabel:"Mare & Verdure",accent:"acc-mare",tags:[["mare","tag-mare"],["DOP","tag-dop"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",ingredients:["Seppie fresche gia pulite 500 g (⚠ molluschi)","Zucchine 2 medie circa 300 g","Noci sgusciate 60 g (⚠ frutta a guscio)","Parmigiano Reggiano DOP stagionato 30 g","Olio extravergine di oliva DOP Terra di Bari 60 g","Arancia a vivo 1 media","Limone a vivo 1 medio","Aglio 1/2 spicchio","Sale fino, pepe nero macinato q.b.","Prezzemolo fresco q.b."],macros:{kcal:260,prot:28,carb:8,grassi:14},note:"Piatto fresco e profumato. Naturalmente senza lattosio e senza glutine. Non adatto a chi e allergico ai molluschi e alla frutta a guscio.",allergeni:"Molluschi (seppia) · Frutta a guscio (noci)",procedimento:"Porta a ebollizione acqua leggermente salata; immergi le seppie 1-2 minuti (da ripresa del bollore) finche diventano bianche e tenere. Scola e lascia raffreddare. Affetta le seppie a striscioline sottili. Lava le zucchine e, con una mandolina, affettale a fettine sottilissime; condisci con un pizzico di sale e lascia riposare 10 min, poi asciuga con carta assorbente. Prepara il pesto alle noci: frulla le noci con il Parmigiano DOP, l'aglio, il prezzemolo e un pizzico di sale; aggiungi l'olio EVO DOP a filo fino a ottenere una crema omogenea; regola di sale e pepe. Pela a vivo l'arancia e il limone eliminando buccia e pellicine bianche; ricava gli spicchi e raccogli il succo rilasciato. In una ciotola unisci seppie, zucchine e un filo d'olio; aggiungi gli spicchi di agrumi e parte del succo. Componi il piatto distribuendo il pesto, completa con pepe e qualche gheriglio di noce spezzato.",motivazione:"La seppia e mollusco magrissimo con soli 72 kcal/100 g e proteine nobili (15 g/100 g). Le zucchine sono ipocaloriche e ricche di potassio e vitamina C. Il pesto alle noci apporta Omega-3 ALA, vitamina E e fitosteroli. Gli agrumi a vivo apportano vitamina C, flavonoidi e acido folico. L'olio EVO DOP Terra di Bari e eccezionalmente ricco di polifenoli (oltre 500 mg/kg) con azione antiossidante e antinfiammatoria. Collegamento Agenda 2030: Obiettivo 3 (salute), Obiettivo 12 (consumo responsabile), Obiettivo 14 (vita sott'acqua).",cottura:"Sbianchitura brevissima della seppia (1-2 min in acqua bollente): tecnica che preserva la texture tenera evitando la gommosita. Zucchine a crudo con mandolina. Pesto preparato a freddo (nessun trattamento termico per preservare i polifenoli delle noci). Agrumi pelati a vivo ed aggiunti crudi.",antitumorale:"Le noci contengono acido ellagico, juglone e Omega-3 ALA con documentata attivita antiproliferativa. Gli agrumi apportano limonene, vitamina C e flavonoidi con effetto pro-apoptotico. Le seppie contengono taurina con azione antiossidante. L'olio EVO DOP Terra di Bari apporta oleocantale e oleaceina.",stagione:"Zucchine: primavera-estate (maggio-settembre). Arance e limoni: inverno-primavera. Seppie: disponibili tutto l'anno, ottimali febbraio-giugno.",approfondimento:{nome:"Olio EVO DOP 'Terra di Bari'",marchio:"DOP",descrizione:"L'Olio Extravergine d'Oliva 'Terra di Bari' DOP e prodotto principalmente dalla cultivar Coratina, varieta autoctona pugliese nota per l'altissimo contenuto di polifenoli (oltre 500 mg/kg) e l'intensita gusto-olfattiva. Il disciplinare DOP garantisce la provenienza delle olive dai comuni della provincia di Bari e la frangitura entro 24 ore dalla raccolta. I polifenoli (oleocantale, oleaceina, oleuropeina) svolgono una documentata azione antinfiammatoria e cardioprotettiva paragonabile ai FANS a basse dosi."},ingChips:[{t:"Seppia km0",c:"km0"},{t:"Olio EVO DOP Terra di Bari",c:"dop"},{t:"Zucchine km0",c:"km0"},{t:"Noci",c:""},{t:"Agrumi a vivo",c:"km0"},{t:"Prezzemolo",c:"km0"}]},
  {id:16,numero:17,title:"Polpo grigliato su crema di patate, maionese di polpo ed erbe mediterranee",chef:"Capezza",cat:"mare",catLabel:"Mare & Pesce",accent:"acc-mare",
   tags:[["mare","tag-mare"],["DOP","tag-dop"],["km0","tag-km0"]],porzioni:"Dosi per 4 persone",
   ingredients:["1 polpo fresco 1,2–1,4 kg (km0, pescato localmente)","400 g patate novelle di stagione","2 uova (per la maionese — ⚠ uova)","Olio EVO Penisola Sorrentina DOP q.b.","1 Limone di Sorrento IGP (scorza e succo)","Timo fresco","Basilico fresco","Maggiorana fresca","Prezzemolo fresco","Sale e pepe nero q.b.","1 cucchiaino di senape (per la maionese — ⚠ senape)"],
   macros:{kcal:320,prot:30,carb:18,grassi:14},note:"Doppia cottura: bollitura lenta + grigliatura ad alta temperatura. Il liquido di cottura diventa maionese: cucina sostenibile a zero sprechi.",
   allergeni:"Molluschi (polpo) · Uova (maionese) · Senape",
   procedimento:"Bollire il polpo in acqua non salata con foglia d’alloro per 40–50 min a fuoco basso. Lasciare raffreddare nel liquido di cottura. Lessare le patate novelle, scolare, schiacciare con olio EVO DOP, sale e timo fresco; passare al setaccio per crema vellutata. Preparare la maionese di polpo: frullare 2 uova con 50 ml di liquido di cottura freddo del polpo, incorporare olio EVO a filo con senape fino a emulsione stabile. Grigliare i tentacoli su griglia caldissima 3–4 min per lato fino a superficie croccante. Stendere la crema di patate sul fondo del piatto a cerchio, adagiare il tentacolo al centro, decorare con la maionese con sac-à-poche in piccoli punti, guarnire con erbe aromatiche fresche e scorza di Limone di Sorrento IGP.",
   motivazione:"Il polpo è fonte eccellente di proteine ad alto valore biologico (18 g/100 g) con bassissimo contenuto di grassi (1 g/100 g) e minerali essenziali: ferro, zinco, selenio e iodio. Contiene taurina con azione antiossidante. Le patate novelle apportano potassio (550 mg/100 g) e vitamina C. L’olio EVO Penisola Sorrentina DOP fornisce acidi grassi monoinsaturi cardioprotettivi e polifenoli (oleocantale, oleuropeina). Le erbe mediterranee fresche aggiungono flavonoidi antiossidanti. La maionese riutilizza il liquido di cottura: zero sprechi alimentari.",
   cottura:"DOPPIA COTTURA DEL POLPO: 1) Bollitura lenta a fuoco basso (40–50 min): rompe il collagene rendendolo morbido e succoso; il liquido si arricchisce di peptidi bioattivi da conservare per la maionese. 2) Grigliatura ad alta temperatura (3–4 min/lato su griglia ≥ 250°C): la reazione di Maillard crea una crosta croccante con composti aromatici (pirazine, furoni) che sviluppano il caratteristico sapore affumicato.",
   antitumorale:"Il polpo contiene selenio (50 µg/100 g, quasi il 100% del fabbisogno giornaliero) essenziale per selenoproteine con documentata azione protettiva contro i tumori del colon e della prostata. Il prezzemolo è ricco di apigenina (antiproliferativa) e luteolina. Il timo contiene timolo e carvacrolo con attività citotossica. La maggiorana apporta acido ursolico con azione pro-apoptotica. Il Limone di Sorrento IGP, con il suo limonene, è tra i composti più studiati in oncologia preventiva.",
   stagione:"Polpo fresco: tutto l’anno, ottimale estate-autunno. Patate novelle: primavera-estate (aprile-luglio). Erbe aromatiche fresche: primavera-estate. Limone di Sorrento IGP: tutto l’anno.",
   approfondimento:{nome:"Olio EVO Penisola Sorrentina DOP",marchio:"DOP",descrizione:"Prodotto esclusivamente dai comuni della Penisola Sorrentina (Sorrento, Massa Lubrense, Sant’Agnello, Piano di Sorrento, Meta, Vico Equense) con olive delle varietà Minucciola e Rotondella, coltivate sui terrazzamenti a picco sul mare. Il disciplinare DOP garantisce raccolta manuale o meccanica con pettini entro il 31 gennaio, frangitura entro 24 ore e acidità ≤ 0,5%. Il profilo sensoriale è caratteristico: fruttato verde con note di erba e mandorla, amaro e piccante equilibrati — segnale dell’alto contenuto di polifenoli (oleuropeina, idrossitirosolo) con comprovata azione antiossidante e anti-infiammatoria. Questo è lo stesso olio utilizzato nella ricetta, prodotto a pochi chilometri dal mare in cui è stato pescato il polpo."},
   ingChips:[{t:"Polpo km0",c:"km0"},{t:"Patate novelle",c:"km0"},{t:"Olio EVO DOP Sorrento",c:"dop"},{t:"Limone Sorrento IGP",c:"igp"},{t:"Erbe mediterranee",c:"km0"},{t:"Uova",c:""},{t:"Senape",c:""}]},
  {id:17,numero:18,title:"Delizia al Limone di Sorrento IGP",chef:"Fiore",cat:"veg",catLabel:"Dolci & Dessert",accent:"acc-pasta",
   tags:[["IGP","tag-dop"],["km0","tag-km0"]],porzioni:"Dosi per 8 persone",
   ingredients:["4 uova (⚠ uova)","200 ml latte intero (⚠ latte)","150 g zucchero semolato","80 g farina 00 (⚠ glutine)","30 g amido di mais","1 pizzico di sale","3 limoni di Sorrento IGP (succo e scorza)","30 ml limoncello PAT (⚠ anidride solforosa)","400 ml panna fresca pastorizzata (⚠ latte)","60 g burro (⚠ latte)"],
   macros:{kcal:310,prot:6,carb:38,grassi:15},note:"La delizia al limone è il dolce simbolo di Sorrento, inventato nel 1978 dal pasticciere Carmine Marzuillo. Il limone di Sorrento IGP è l'ingrediente protagonista assoluto.",
   allergeni:"Uova · Latte e derivati (latte, panna, burro) · Glutine (farina) · Anidride solforosa (limoncello)",
   procedimento:"Preparare la crema pasticcera: scaldare il latte con la scorza di limone IGP. Sbattere tuorli e zucchero, aggiungere farina e amido setacciati, incorporare il latte caldo a filo. Cuocere a fuoco dolce fino ad addensamento. Far raffreddare con pellicola a contatto. Preparare i pan di Spagna a forma di semisfera (stampi da 8 cm), cotti a 175°C per 15 min. Scavare leggermente le semisfere e riempire con crema al limone IGP. Montare la panna, incorporare delicatamente il limoncello PAT e la scorza di limone IGP grattugiata. Ricoprire completamente le delizie con la crema alla panna e limoncello. Decorare con scorza di limone IGP e servire fredde.",
   motivazione:"La Delizia al Limone valorizza il Limone di Sorrento IGP, ricchissimo di limonene, vitamina C e bioflavonoidi con documentate proprietà antiossidanti. Il limoncello PAT sorrentino, prodotto dalla macerazione della scorza del Limone IGP in alcool etilico, mantiene concentrati gli oli essenziali della buccia. Le uova apportano proteine complete e vitamina D. Il latte intero fornisce calcio biodisponibile. Rispetto ad altri dolci della pasticceria industriale, la delizia artigianale non contiene conservanti, coloranti né grassi idrogenati.",
   cottura:"La crema pasticcera viene cotta a fuoco dolce (T ≤ 85°C) con continuo mescolamento: questa tecnica coagula le proteine dell'uovo senza superare il punto di ebollizione, evitando la formazione di grumi. Il pan di Spagna viene cotto a 175°C per 15 min: l'aria inglobata nell'impasto durante la montatura delle uova garantisce la sofficità senza agenti lievitanti chimici. Il limoncello PAT e la scorza di limone IGP vengono incorporati nella panna SEMPRE a freddo: il calore degraderebbe il limonene volatile e la vitamina C termolabile.",
   antitumorale:"Il limonene della scorza del Limone di Sorrento IGP è tra i composti naturali più studiati in oncologia preventiva: inibisce la farnesil-proteina transferasi, enzima chiave nella crescita tumorale, e ha mostrato attività regressiva su tumori al seno in studi clinici. La vitamina C del limone inibisce la formazione di nitrosammine cancerogene. Il limoncello PAT, prodotto dalla scorza del limone IGP, concentra ulteriormente gli oli essenziali ricchi di limonene e terpeni con attività antiproliferativa documentata.",
   stagione:"Tutto l'anno. Limone di Sorrento IGP ottimale in inverno-primavera (primofiore). Dolce tradizionale delle festività pasquali e estive sorrentine.",
   approfondimento:{nome:"Limoncello di Sorrento PAT",marchio:"PAT",descrizione:"Il Limoncello di Sorrento è un Prodotto Agroalimentare Tradizionale (PAT) riconosciuto dal Ministero dell'Agricoltura. Si ottiene dalla macerazione della scorza del Limone di Sorrento IGP (esclusivamente la parte gialla, senza l'albedo amaro) in alcool etilico a 95° per almeno 7 giorni, seguita dalla diluizione con sciroppo di acqua e zucchero. La qualità del limoncello dipende interamente dalla qualità della scorza del limone IGP: maggiore è il contenuto di limonene e oli essenziali (fino al 70% degli aromi), più intenso e profumato sarà il risultato. Il disciplinare PAT ne garantisce l'origine territoriale e il metodo di produzione artigianale."},
   ingChips:[{t:"Limone Sorrento IGP",c:"igp"},{t:"Limoncello PAT",c:"pat"},{t:"Uova fresche",c:""},{t:"Panna fresca",c:""},{t:"Burro",c:""},{t:"Farina 00",c:""},{t:"Amido di mais",c:""}]},

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function applyEdits() {
  const r = data.find(x => x.id === currentEditId);
  if (!r) return;
  const id = currentEditId;

  // ── data[] fields ──
  r.title       = document.getElementById('ef-title').value.trim();
  r.chef        = document.getElementById('ef-chef').value.trim();
  const newCat  = document.getElementById('ef-cat').value;
  const catLabels = {mare:'Mare & Pesce',pasta:'Pasta & Cereali',insalata:'Insalate di Cereali',legumi:'Zuppe & Legumi',veg:'Verdure & Cereali'};
  r.cat         = newCat;
  r.catLabel    = catLabels[newCat] || newCat;
  r.porzioni    = document.getElementById('ef-porzioni').value.trim();
  r.note        = document.getElementById('ef-note').value.trim();
  r.ingredients = document.getElementById('ef-ing').value.split('\n').map(s=>s.trim()).filter(Boolean);
  r.allergeni   = document.getElementById('ef-allergeni').value.trim();
  r.macros.kcal = parseInt(document.getElementById('ef-kcal').value)||0;
  r.macros.prot = parseInt(document.getElementById('ef-prot').value)||0;
  r.macros.carb = parseInt(document.getElementById('ef-carb').value)||0;
  r.macros.grassi= parseInt(document.getElementById('ef-grassi').value)||0;
  r.procedimento= document.getElementById('ef-proc').value.trim();
  r.motivazione = document.getElementById('ef-motiv').value.trim();
  r.cottura     = document.getElementById('ef-cottura').value.trim();
  r.antitumorale= document.getElementById('ef-antitum').value.trim();
  r.stagione    = document.getElementById('ef-stagione').value.trim();

  // ── approfondimento ──
  r.approfondimento = {
    nome:       document.getElementById('ef-appro-nome').value.trim(),
    marchio:    document.getElementById('ef-appro-marchio').value,
    descrizione:document.getElementById('ef-appro-desc').value.trim()
  };

  // ── extraData fields ──
  if (!extraData[id]) extraData[id] = {};
  extraData[id].diabete = document.getElementById('ef-diabete').value.trim();
  extraData[id].adattamenti = {
    vegan:    document.getElementById('ef-adapt-vegan').value.trim(),
    lattosio: document.getElementById('ef-adapt-lattosio').value.trim(),
    celiaci:  document.getElementById('ef-adapt-celiaci').value.trim(),
    halal:    document.getElementById('ef-adapt-halal').value.trim(),
    kosher:   document.getElementById('ef-adapt-kosher').value.trim()
  };

  // ── sdgData fields ──
  const sdgs = sdgData[id] || [];
  sdgs.forEach((s,i) => {
    const nEl = document.getElementById(`ef-sdg-n-${i}`);
    const tEl = document.getElementById(`ef-sdg-titolo-${i}`);
    const dEl = document.getElementById(`ef-sdg-desc-${i}`);
    if (nEl) s.n      = parseInt(nEl.value)||s.n;
    if (tEl) s.titolo = tEl.value.trim();
    if (dEl) s.desc   = dEl.value.trim();
  });

  renderCards(currentCardFilter);
  renderSchede(currentSchedeFilter);
  buildEditorSelect();
  showToast('✓ Modifiche applicate!');
}

function deleteRecipe(id) {
  if (!confirm('Eliminare questa ricetta?')) return;
  data = data.filter(r => r.id !== id);
  currentEditId = data.length ? data[0].id : -1;
  renderCards(currentCardFilter);
  renderSchede(currentSchedeFilter);
  buildEditorSelect();
  showToast('Ricetta eliminata');
}

/* ══════════════════════════════════════════════════
   DOWNLOAD HTML
══════════════════════════════════════════════════ */
function downloadHTML() {
  const serializedData     = JSON.stringify(data, null, 2).replace(/<\/script>/g, '<\\/script>');
  const serializedExtra    = JSON.stringify(extraData, null, 2).replace(/<\/script>/g, '<\\/script>');
  const serializedSdg      = JSON.stringify(sdgData, null, 2).replace(/<\/script>/g, '<\\/script>');
  let html = document.documentElement.outerHTML;
  // Replace data[]
  html = html.replace(
    /\/\* ══+ DATA ══+\*\/[\s\S]*?^];/m,
    `/* ${'═'.repeat(50)}\n   DATA\n${'═'.repeat(50)} */\nlet data = ${serializedData};`
  );
  // Replace extraData[]
  html = html.replace(
    /const extraData = \[[\s\S]*?^\];/m,
    `const extraData = ${serializedExtra};`
  );
  // Replace sdgData[]
  html = html.replace(
    /const sdgData = \[[\s\S]*?^\];/m,
    `const sdgData = ${serializedSdg};`
  );
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ricette_salutari.html';
  a.click();
  showToast('⬇ Download avviato!');
}

  document.getElementById('modal-overlay').classList.add('open');

function closeModal(e) {
  if (e && e.target!==document.getElementById('modal-overlay') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

   HELPERS
══════════════════════════════════════════════════ */
function toggleIng(btn) {
  const list = btn.nextElementSibling;
  const icon = btn.querySelector('.toggle-icon');
  list.classList.toggle('open');
  icon.classList.toggle('open');
}
function switchView(view, btn) {
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
  if (view === 'haccp') renderHaccp(currentHaccpFilter);
}
function filterCards(cat, btn) {
  document.querySelectorAll('#view-cards .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(cat);
}
function filterSchede(cat, btn) {
  document.querySelectorAll('#view-schede .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSchede(cat);
}
