  {"diabete":"La pasta di Gragnano IGP trafilata al bronzo ha una struttura proteica più compatta che rallenta la digestione degli amidi: IG ≈ 45–50. La crema di peperoni arrostiti non aggiunge zuccheri semplici. Per l'ipertensione: il potassio dei peperoni (211 mg/100 g) e i flavonoidi del basilico esercitano un effetto vasodilatorio. Per l'aterosclerosi: i carotenoidi dei peperoni (betacarotene, luteina) riducono l'ossidazione delle LDL; il piatto è privo di grassi saturi.","adattamenti":{"vegan":"Il piatto è già vegano se si omette il parmigiano o si sostituisce con lievito alimentare (2 cucchiai).","lattosio":"Omettere il parmigiano o sostituire con parmigiano stagionato ≥24 mesi (naturalmente privo di lattosio).","celiaci":"Sostituire la pasta con pasta di riso, mais o grano saraceno. Verificare certificazione gluten-free.","halal":"Il piatto è naturalmente halal. Verificare che la pasta non contenga additivi di origine animale non halal.","kosher":"Il piatto è parve senza parmigiano, lattisinio (milchig) con il parmigiano."},"haccp":{"fasi":[{"nome":"Ricezione peperoni freschi e pasta di Gragnano IGP","pericolo":"Biologico: muffe tossigene (Fusarium) su peperoni ammaccati; Fisico: frammenti di plastica da imballaggi danneggiati nella pasta; Chimico: residui di pesticidi organofosforati sui peperoni convenzionali","ccp":false,"misura":"Selezionare peperoni sodi, lucidi, senza ammaccature; confezione pasta integra; preferire peperoni biologici; verificare lotto e scadenza"},{"nome":"Stoccaggio refrigerato peperoni lavati e crema cotta","pericolo":"Biologico: Listeria sulle superfici tagliate dei peperoni; Fisico: contaminazione crociata nel frigorifero; Chimico: ossidazione dei carotenoidi della crema a T ambiente","ccp":true,"misura":"Peperoni tagliati: contenitore chiuso a ≤ 4°C, consumare entro 24h; crema di peperoni: raffreddare entro 90 min a ≤ 10°C, conservare a ≤ 4°C, consumare entro 48h"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: muffe sul parmigiano a temperatura ambiente dopo l'apertura; insetti nella pasta di Gragnano in confezioni danneggiate; Chimico: ossidazione dell'olio EVO; alterazione degli aromi dell'aglio secco in ambienti umidi; Fisico: corpi estranei (insetti, frammenti di imballaggio) in confezioni di pasta non chiuse correttamente","ccp":false,"misura":"Ingredienti a T ambiente: pasta di Gragnano IGP (contenitore chiuso, T ≤ 20°C, lontana da fonti di calore), olio EVO (buio, fresco), aglio fresco (luogo asciutto e ventilato). Procedura FIFO: etichettare ogni confezione con data di apertura; pasta aperta: consumare entro 6 mesi; olio EVO: consumare entro 2 mesi dall'apertura"},{"nome":"Lavaggio peperoni","pericolo":"Biologico: E. coli e Salmonella sulla superficie esterna; Fisico: terriccio e insetti; Chimico: riduzione residui di pesticidi","ccp":true,"misura":"Lavaggio sotto acqua corrente ≥ 30 sec con sfregamento; immersione in acqua con bicarbonato 5 min; risciacquo abbondante; asciugare prima dell'arrostimento"},{"nome":"Arrostimento peperoni (forno 220°C o fiamma diretta)","pericolo":"Chimico: formazione di acrilammide e benzopirene (IPA) nelle parti carbonizzate; Fisico: rischio ustioni da fiamma diretta; Biologico: inattivazione completa dei patogeni superficiali","ccp":true,"misura":"T forno ≤ 230°C; non carbonizzare completamente; eliminare tutte le parti annerite dopo la pelatura; girare frequentemente in caso di fiamma diretta"},{"nome":"Cottura pasta al dente e mantecatura","pericolo":"Fisico: corpi estranei nella pasta cruda; Biologico: ricontaminazione da utensili; Chimico: nessuno specifico","ccp":false,"misura":"Ispezionare la pasta cruda; acqua a forte ebollizione; colino pulito; servire immediatamente a T > 65°C"}]}},
  {"diabete":"Le lenticchie rosse hanno uno degli indici glicemici più bassi tra i legumi (IG ≈ 21–26); la combinazione con le proteine della spigola crea un pasto a bassissimo carico glicemico (GL ≈ 8). Il rosmarino contiene acido rosmarinico che inibisce l'enzima alfa-glucosidasi. Per l'ipertensione: la spigola è a basso contenuto di sodio; il potassio delle lenticchie (955 mg/100 g) bilancia il sodio intracellulare. Per l'aterosclerosi: gli acidi grassi insaturi della spigola proteggono le arterie; le lenticchie abbassano il colesterolo totale e LDL.","adattamenti":{"vegan":"Sostituire la spigola con 200 g di tofu compatto dorato in padella o con polpette di lenticchie.","lattosio":"Il piatto è naturalmente privo di lattosio. Nessuna modifica.","celiaci":"Il piatto è naturalmente senza glutine. Verificare che il brodo vegetale non contenga additivi con glutine.","halal":"La spigola è halal. Il brodo vegetale non deve contenere alcol o additivi non permessi.","kosher":"La spigola ha pinne e squame — è kosher. Il piatto è parve."},"haccp":{"fasi":[{"nome":"Ricezione filetti di spigola freschi","pericolo":"Biologico: Listeria monocytogenes e Anisakis simplex (larve parassitarie); Fisico: lische residue nei filetti; Chimico: PCB e diossine (bioaccumulati nei pesci predatori)","ccp":true,"misura":"T ricezione ≤ 2°C; ispezione visiva (carne bianca compatta, odore marino); candling per Anisakis; certificato sanitario; rifiutare se T > 4°C"},{"nome":"Stoccaggio refrigerato spigola","pericolo":"Biologico: moltiplicazione rapida di Listeria e Pseudomonas (crescono anche a 2–4°C); Fisico: gocciolamento su altri alimenti; Chimico: ossidazione degli Omega-3 con formazione di perossidi","ccp":true,"misura":"T 0–2°C in contenitore ermetico; ripiano inferiore dedicato al pesce; consumare entro 24h; se non utilizzata entro 24h: abbattere a -18°C"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: muffe e aflatossine sulle lenticchie rosse in ambienti umidi; insetti nei legumi sfusi (Callosobruchus maculatus — tonchio dei legumi); Chimico: ossidazione dell'olio EVO; alterazione del rosmarino secco in contenitori non chiusi; Fisico: sassolini nelle lenticchie sfuse; corpi estranei nel brodo vegetale in polvere","ccp":false,"misura":"Ingredienti a T ambiente: lenticchie rosse (contenitore ermetico, T ≤ 20°C, umidità < 60%), olio EVO (buio e fresco), rosmarino essiccato (contenitore ermetico), brodo vegetale (confezione chiusa). Procedura FIFO: etichettare con data di apertura; lenticchie: verificare mensilmente la presenza di insetti; consumare entro 12 mesi; olio EVO: ruotare lo stock ogni 2 mesi"},{"nome":"Cottura spigola in padella (3 min lato pelle + 2 min)","pericolo":"Biologico: sopravvivenza di Anisakis se T interna insufficiente (muore a ≥ 60°C per ≥ 1 min); Fisico: lische non rilevate alla ricezione; Chimico: formazione di AHA se la superficie brucia","ccp":true,"misura":"T interna ≥ 63°C (termometro a sonda); polpa da traslucida a bianco opaco come indicatore visivo; non annerire la superficie; rimuovere lische prima del servizio"},{"nome":"Cottura lenticchie rosse (20 min, ebollizione)","pericolo":"Biologico: lectine tossiche se cottura insufficiente; Fisico: sassolini non rimossi; Chimico: prodotti di ossidazione nel brodo se riutilizzato","ccp":true,"misura":"Selezione visiva prima della cottura; ebollizione ≥ 100°C per ≥ 20 min; brodo fresco; lenticchie devono sfaldarsi facilmente"},{"nome":"Impiattamento e servizio","pericolo":"Biologico: ricontaminazione post-cottura; Fisico: lische residue; Chimico: nessuno specifico","ccp":false,"misura":"Ispezionare ogni filetto prima del servizio; utensili separati crudo/cotto; servire immediatamente a T > 65°C"}]}},
  {"diabete":"Preferire riso integrale (IG ≈ 50 vs parboiled IG ≈ 64). Il raffreddamento del riso aumenta la quota di amido resistente riducendo la risposta glicemica. Il tonno apporta proteine (24 g/100 g) che rallentano lo svuotamento gastrico. Per l'ipertensione: le olive di Gaeta DOP sono ricche di acido oleico e polifenoli antiossidanti; sciacquare le olive in salamoia per ridurre il sodio. Per l'aterosclerosi: l'acido oleico delle olive aumenta le HDL e riduce le LDL ossidate.","adattamenti":{"vegan":"Sostituire il tonno con 200 g di ceci al naturale o jackfruit in salamoia + 1 cucchiaio di alga nori sbriciolata per il sapore marino.","lattosio":"Il piatto è naturalmente privo di lattosio. Nessuna modifica.","celiaci":"Il piatto è naturalmente senza glutine. Verificare la certificazione GF del tonno in scatola e del mais.","halal":"Il tonno è halal. Verificare che le olive non contengano vino nella salamoia.","kosher":"Il tonno è kosher (ha pinne e squame). Il piatto è parve."},"haccp":{"fasi":[{"nome":"Ricezione tonno in scatola e olive di Gaeta DOP","pericolo":"Biologico: Clostridium botulinum in conserve danneggiate; Chimico: istamina nel tonno (Scombridae) e sodio eccessivo nelle olive in salamoia; Fisico: noccioli nelle olive e frammenti metallici da lattine deformate","ccp":true,"misura":"Rifiutare lattine rigonfie o deformate; all'apertura: odore e colore normali; verificare assenza noccioli nelle olive; data scadenza; registrare fornitore e lotto"},{"nome":"Stoccaggio refrigerato (tonno e olive aperte)","pericolo":"Biologico: moltiplicazione rapida di Staphylococcus aureus nel tonno a T ambiente; Chimico: ossidazione degli Omega-3 esposti a luce e aria; Fisico: contaminazione crociata da prodotti crudi","ccp":true,"misura":"Tonno: contenitore di vetro chiuso a ≤ 4°C; consumare entro 12h; olive aperte: in salamoia a ≤ 4°C; mai lasciare mai tonno aperto a T ambiente; non mescolare con prodotti crudi"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: Clostridium botulinum in lattine di tonno danneggiate o rigonfie; contaminazione da insetti nel riso sfuso; Chimico: ossidazione dell'olio EVO; perdita dell'olio di condimento delle olive in salamoia in contenitori non chiusi; Fisico: frammenti metallici da lattine deformate; corpi estranei nel riso","ccp":false,"misura":"Ingredienti a T ambiente: riso (contenitore ermetico, T ≤ 20°C), tonno in lattina integra (T ≤ 25°C, lontano da fonti di calore e umidità), olio EVO (buio e fresco), origano (contenitore chiuso). Procedura FIFO: etichettare ogni confezione con data apertura; lattine: ispezionare integrità mensile; riso: consumare entro 12 mesi; ruotare sempre (vecchio avanti, nuovo dietro)"},{"nome":"Cottura e raffreddamento rapido del riso","pericolo":"Biologico: Bacillus cereus (spore termoresistenti producono tossina emetica nel raffreddamento lento); Chimico: nessuno specifico; Fisico: corpi estranei nel riso crudo","ccp":true,"misura":"Ispezionare riso prima della cottura; raffreddare entro 90 min a ≤ 10°C (abbattitore o bagno ghiacciato); conservare a ≤ 4°C; non mantenere il riso cotto a T ambiente oltre 2h"},{"nome":"Lavaggio e taglio verdure crude","pericolo":"Biologico: E. coli O157:H7 e Listeria sui pomodorini; Fisico: terra e insetti sui cetriolini; Chimico: residui di pesticidi su verdure convenzionali","ccp":false,"misura":"Lavaggio abbondante; immersione 5 min in acqua con bicarbonato; tagliere e coltello dedicati alle verdure (separato dal pesce)"},{"nome":"Assemblaggio finale e servizio","pericolo":"Biologico: ricontaminazione da utensili o mani; Fisico: noccioli nelle olive; Chimico: eccesso di sodio dalla salamoia delle olive","ccp":false,"misura":"Utensili sanificati; sciacquare le olive per ridurre il sodio; servire entro 2h a T ambiente o entro 24h a ≤ 4°C"}]}},
  {"diabete":"L'orzo integrale ha l'IG più basso tra i cereali (IG ≈ 22) grazie all'alto contenuto di beta-glucani (4–8 g/100 g). L'EFSA riconosce il claim 'i beta-glucani dell'orzo contribuiscono al mantenimento di normali livelli di glucosio nel sangue'. Per l'ipertensione: gli Omega-3 delle alici di Cetara abbassano la pressione sistolica; le alici sono ricche di peptidi bioattivi con attività inibitoria dell'ACE. Attenzione al sodio residuo delle alici: dissalare accuratamente. Per l'aterosclerosi: i beta-glucani dell'orzo riducono il colesterolo LDL.","adattamenti":{"vegan":"Omettere le alici e sostituire con 2 cucchiai di pasta di miso + alga kombu (umami simile alle alici) + 20 g di capperi dissalati.","lattosio":"Il piatto è naturalmente privo di lattosio. Nessuna modifica.","celiaci":"L'orzo contiene glutine. Sostituire con riso integrale o grano saraceno (stessa tecnica del risotto).","halal":"Le alici sono halal. Verificare assenza di additivi non halal nel brodo.","kosher":"Le alici sono kosher (hanno pinne e squame). Il piatto è parve."},"haccp":{"fasi":[{"nome":"Ricezione alici di Cetara sotto sale","pericolo":"Biologico: Listeria monocytogenes nelle alici salate (sopravvive nella salamoia); Chimico: elevato contenuto di sodio (fino a 25 g NaCl/100 g) e possibile istamina; Fisico: lische residue e frammenti di sale grosso cristallizzato","ccp":true,"misura":"Carne rosato-arancio soda, odore tipico salato-marino; rifiutare prodotto molliccio, grigio o con odore rancido; conservare a ≤ 4°C; verificare integrità del contenitore"},{"nome":"Stoccaggio refrigerato (alici dissalate e orzo in ammollo)","pericolo":"Biologico: Listeria monocytogenes (psicrotrofa, cresce anche a 0°C) nelle alici dissalate; Chimico: ossidazione degli Omega-3 a T ambiente con produzione di perossidi lipidici; Fisico: lische che si ammorbidiscono","ccp":true,"misura":"Alici dissalate: contenitore chiuso a 0–2°C; consumare entro 6h; orzo in ammollo: frigorifero a ≤ 4°C; mai ammollare a T ambiente per > 1h"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: muffe e insetti nell'orzo integrale sfuso; muffe nell'aglio fresco conservato in ambienti umidi; Chimico: ossidazione dell'olio EVO in contenitori trasparenti esposti alla luce; degradazione degli aromi del limone se conservato a T > 25°C; Fisico: corpi estranei nell'orzo sfuso; frammenti di scorza nelle spezie","ccp":false,"misura":"Ingredienti a T ambiente: orzo integrale (contenitore ermetico, T ≤ 20°C), olio EVO DOP (buio, fresco, T ≤ 20°C), aglio (luogo asciutto e ventilato, non in frigorifero). Procedura FIFO: etichettare con data di apertura; orzo: consumare entro 6 mesi dall'apertura; olio EVO: consumare entro 2 mesi; ispezione settimanale visiva e olfattiva"},{"nome":"Dissalatura alici (30 min in acqua fredda)","pericolo":"Biologico: Listeria sopravvive nell'acqua di dissalatura a T ambiente; Fisico: lische residue difficili da rilevare; Chimico: NaCl residuo eccessivo se dissalatura insufficiente","ccp":true,"misura":"Immersione in acqua fredda (T ≤ 10°C) cambiando l'acqua 2 volte; non dissalare a T ambiente; rimozione manuale delle lische; assaggiare per verificare sapidità accettabile"},{"nome":"Cottura orzotto con tecnica risotto (35–40 min, T ≥ 90°C)","pericolo":"Biologico: spore di Bacillus cereus nell'orzo; Fisico: corpi estranei nel brodo non filtrato; Chimico: prodotti di ossidazione nel brodo riutilizzato","ccp":true,"misura":"Ebollizione leggera costante (T ≥ 90°C) per tutta la cottura; brodo fresco e filtrato; T interna ≥ 85°C a fine cottura"},{"nome":"Aggiunta alici fuori fuoco e servizio","pericolo":"Biologico: ricontaminazione post-cottura; Fisico: lische non rilevate nella dissalatura; Chimico: degradazione degli Omega-3 se le alici sono esposte a T > 70°C","ccp":false,"misura":"Aggiungere le alici fuori fuoco (T < 60°C); ispezionare ogni filetto; servire immediatamente"}]}},
  {"diabete":"La pasta integrale ha un IG ≈ 40–45 e i piselli apportano 6 g di proteine e 5 g di fibre per 100 g. L'abbinamento cereale integrale + legume crea un pasto a basso GL (≈ 18). La menta fresca contiene acido ursolico con documentata attività di miglioramento della sensibilità insulinica. Per l'ipertensione: i piselli sono ricchi di potassio (244 mg/100 g) e magnesio. Per l'aterosclerosi: le fibre solubili (pectina) dei piselli riducono il colesterolo LDL.","adattamenti":{"vegan":"Il piatto è già vegano se si omette il parmigiano o si sostituisce con lievito alimentare in scaglie (2 cucchiai).","lattosio":"Omettere il parmigiano o sostituire con parmigiano stagionato ≥ 24 mesi (naturalmente privo di lattosio per fermentazione completa).","celiaci":"Sostituire la pasta integrale con pasta di riso, mais o legumi GF.","halal":"Il piatto è naturalmente halal.","kosher":"Il piatto è parve senza parmigiano, lattisinio (milchig) con il parmigiano."},"haccp":{"fasi":[{"nome":"Ricezione piselli freschi/surgelati e pasta integrale","pericolo":"Biologico: aflatossine su piselli ammaccati o umidi; Fisico: sassolini e frammenti di baccello nei piselli sfusi; Chimico: residui di pesticidi organofosforati sui piselli convenzionali","ccp":false,"misura":"Piselli freschi: colore verde brillante, consistenza soda; surgelati: catena del freddo intatta (T ≤ -18°C); pasta: confezione integra; preferire piselli biologici"},{"nome":"Stoccaggio refrigerato piselli freschi sgranati","pericolo":"Biologico: moltiplicazione di Listeria e batteri mesofili nei piselli sgranati a T ambiente (perdono la barriera protettiva del baccello); Chimico: ossidazione della vitamina C e della clorofilla; Fisico: contaminazione crociata nel frigorifero","ccp":true,"misura":"Piselli sgranati in contenitore chiuso a ≤ 4°C; usare entro 24h; piselli scongelati: mai ricongelare; consumare immediatamente; separare da prodotti di origine animale crudi"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: insetti nella pasta integrale in confezioni danneggiate (Ephestia kuehniella — tignola della farina); muffe sulla cipolla in ambienti umidi; Chimico: irrancidimento del germe di grano nella pasta integrale in confezioni aperte (la farina integrale è più sensibile all'ossidazione rispetto alla pasta raffinata); Fisico: corpi estranei in confezioni di pasta integrale mal sigillate","ccp":false,"misura":"Ingredienti a T ambiente: pasta integrale (contenitore ermetico, T ≤ 20°C, lontana da umidità e calore), olio EVO (buio e fresco), cipolla (luogo asciutto e ventilato, non in frigorifero). Procedura FIFO: pasta integrale aperta: consumare entro 3 mesi (il germe di grano si ossida più rapidamente della pasta raffinata); etichettare sempre con data di apertura; verificare l'assenza di insetti mensilmente"},{"nome":"Soffritto cipolla in olio EVO (fuoco moderato)","pericolo":"Chimico: formazione di acroleina se la cipolla brucia (T > 200°C); Fisico: schizzi di olio caldo; Biologico: nessuno specifico","ccp":true,"misura":"Fuoco moderato; T olio ≤ 160°C; la cipolla deve appassire (colore trasparente-dorato) senza annerire; se annerisce: scartare e ricominciare"},{"nome":"Cottura piselli in brodo (10–12 min, T ≥ 85°C)","pericolo":"Biologico: inattivazione di Listeria e batteri mesofili; Fisico: corpi estranei nel brodo non filtrato; Chimico: ossidazione della clorofilla con imbrunimento se cottura eccessiva","ccp":true,"misura":"T ≥ 85°C per ≥ 10 min; brodo fresco e filtrato; non prolungare oltre 15 min; colore verde brillante come indicatore visivo di correttezza della cottura"},{"nome":"Mantecatura e servizio immediato","pericolo":"Biologico: raffreddamento lento in zona di pericolo (60–10°C); Fisico: utensili non sanificati; Chimico: degradazione polifenoli dell'olio EVO se aggiunto a T > 80°C","ccp":false,"misura":"Servire immediatamente a T > 65°C; olio EVO e parmigiano fuori fuoco; non mantenere in caldo oltre 2h"}]}},
  {"diabete":"I carciofi contengono inulina, una fibra prebiotica che non viene digerita e non alza la glicemia. La cinarina dei carciofi stimola la produzione di bile favorendo il metabolismo del glucosio epatico; i broccoli contengono sulforafano che migliora la sensibilità insulinica. Per l'ipertensione: la verza è ricca di vitamina K e potassio; i broccoli apportano glucorafanino con proprietà vasodilatatoria. Per l'aterosclerosi: la verza e i broccoli apportano fibra solubile e steroli vegetali che riducono l'assorbimento del colesterolo intestinale.","adattamenti":{"vegan":"Il piatto è già completamente vegano.","lattosio":"Il piatto è naturalmente privo di lattosio. Nessuna modifica.","celiaci":"Il piatto è naturalmente senza glutine. Il riso carnaroli è naturalmente GF.","halal":"Il piatto è naturalmente halal.","kosher":"Il piatto è parve e naturalmente kosher."},"haccp":{"fasi":[{"nome":"Ricezione verdure (carciofi Paestum IGP, broccoli, verza) e riso","pericolo":"Biologico: Listeria tra le foglie dei carciofi e nelle cimette dei broccoli; Fisico: insetti e larve nelle cimette di broccolo; Chimico: residui di pesticidi organoclorurati su verdure convenzionali","ccp":false,"misura":"Ispezione visiva; foglie esterne danneggiate eliminate; immergere broccoli in acqua salata 10 min per insetti; preferire IGP/biologici"},{"nome":"Stoccaggio refrigerato verdure pulite e tagliate","pericolo":"Biologico: Listeria sulle superfici di taglio (psicrotrofa, cresce a 4°C); Fisico: contaminazione crociata nel frigorifero; Chimico: ossidazione glucosinolati dei broccoli e cinarina dei carciofi a T ambiente","ccp":true,"misura":"Contenitore chiuso a ≤ 4°C; carciofi in acqua acidulata; consumare entro 12h; ripiano separato da carni crude"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: insetti nel riso carnaroli sfuso (Sitophilus oryzae — punteruolo del riso); muffe sull'aglio in ambienti umidi; Chimico: ossidazione dell'olio EVO; perdita di aromi delle spezie secche in contenitori non chiusi o esposti alla luce; Fisico: corpi estranei (insetti, frammenti) nel riso sfuso","ccp":false,"misura":"Ingredienti a T ambiente: riso carnaroli (contenitore ermetico, T ≤ 20°C), olio EVO (buio, fresco), aglio (luogo asciutto ventilato). Procedura FIFO: etichettare ogni confezione con data di apertura; riso: ispezionare mensilmente per insetti; consumare entro 12 mesi; olio EVO: consumare entro 2 mesi dall'apertura; non mischiare mai riso vecchio e nuovo nello stesso contenitore"},{"nome":"Lavaggio verdure (immersione in acqua con bicarbonato)","pericolo":"Biologico: rimozione E. coli e Listeria superficiale; Fisico: terra, insetti e afidi residui; Chimico: riduzione residui di pesticidi","ccp":true,"misura":"Immersione in acqua fredda con bicarbonato (1 cucchiaino/L) per 10 min; risciacquo abbondante; carciofi in acqua acidulata con limone (previene ossidazione)"},{"nome":"Saltatura verdure in padella (stir-fry, 3–5 min, T vivace)","pericolo":"Chimico: acroleina se olio EVO supera il punto di fumo (210°C) o brucia; degradazione glucosinolati dei broccoli a T > 150°C prolungata; Fisico: schizzi di olio; Biologico: inattivazione batteri superficiali","ccp":true,"misura":"T olio ≤ 180°C; cottura breve 3–5 min; il colore verde brillante dei broccoli è indicatore visivo che la mirosinasi è ancora attiva (glucosinolati preservati)"},{"nome":"Cottura riso e servizio","pericolo":"Biologico: Bacillus cereus (spore nel riso sopravvivono alla cottura, producono tossina emetica nel raffreddamento lento); Fisico: corpi estranei nel riso; Chimico: nessuno specifico","ccp":true,"misura":"Servire il riso immediatamente; se avanza raffreddare entro 90 min a ≤ 10°C; non conservare il riso cotto a T ambiente oltre 2h"}]}},
  {"diabete":"Il farro semi-perlato ha IG ≈ 40. Il raffreddamento del farro aumenta l'amido resistente; le carote cotte al dente hanno IG inferiore alle carote bollite (al dente IG ≈ 35, bollite IG ≈ 85). Il petto di pollo non alza la glicemia. Per l'ipertensione: il potassio delle zucchine (264 mg/100 g) e delle carote (320 mg/100 g) bilancia l'effetto pressorio del sodio. Per l'aterosclerosi: il pollo alla griglia è privo di grassi saturi in eccesso; l'olio EVO nel condimento a crudo apporta acidi grassi monoinsaturi anti-aterogeni.","adattamenti":{"vegan":"Sostituire il petto di pollo con 250 g di tempeh o seitan alla griglia.","lattosio":"Il piatto è naturalmente privo di lattosio. Nessuna modifica.","celiaci":"Il farro contiene glutine. Sostituire con riso integrale (200 g) o con quinoa (200 g).","halal":"Il pollo deve essere halal certificato (macellazione secondo rito islamico).","kosher":"Il pollo deve essere kosher certificato (shechita). È carne (fleishig): non servire con latticini."},"haccp":{"fasi":[{"nome":"Ricezione petto di pollo fresco","pericolo":"Biologico: Salmonella spp. e Campylobacter jejuni (presenti nel 60–80% del pollame crudo); Fisico: frammenti di osso o cartilagine residui; Chimico: residui di antibiotici nel pollo da allevamento intensivo","ccp":true,"misura":"T ricezione ≤ 4°C; carne rosea compatta, liquido chiaro, assenza odori anomali; certificato sanitario; preferire pollo biologico; registrare lotto e fornitore"},{"nome":"Stoccaggio refrigerato del pollo crudo","pericolo":"Biologico: moltiplicazione esponenziale di Salmonella e Campylobacter (raddoppio ogni 20 min a T ambiente); Fisico: gocciolamento su altri alimenti nel frigorifero; Chimico: ossidazione della mioglobina","ccp":true,"misura":"T ≤ 4°C in contenitore ermetico; ripiano più basso del frigorifero (evita gocciolamento); consumare entro 24h; lavarsi le mani dopo ogni contatto con pollo crudo"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: insetti nel farro semiperlato sfuso; muffe sulla cipolla conservata in ambienti umidi; Chimico: ossidazione dell'olio EVO e del succo di limone in contenitori aperti; irrancidimento del farro in confezioni aperte; Fisico: sassolini nel farro sfuso; corpi estranei nelle confezioni mal sigillate","ccp":false,"misura":"Ingredienti a T ambiente: farro semiperlato (contenitore ermetico, T ≤ 20°C), olio EVO (buio e fresco). Procedura FIFO: etichettare ogni confezione con data di apertura; farro aperto: consumare entro 3 mesi; olio EVO: consumare entro 2 mesi dall'apertura; verificare settimanalmente l'assenza di insetti nel farro; non conservare il farro vicino a prodotti con odori forti (spezie, formaggi stagionati)"},{"nome":"Cottura pollo alla griglia","pericolo":"Biologico: sopravvivenza di Salmonella se T interna < 75°C; Chimico: ammine eterocicliche (AHA) e IPA se la superficie carbonizza; Fisico: frammenti di osso residui","ccp":true,"misura":"T interna ≥ 75°C per ≥ 2 min (termometro a sonda); non carbonizzare; eliminare parti annerite; ispezionare il pollo cotto per frammenti ossei"},{"nome":"Raffreddamento rapido del farro cotto e stoccaggio","pericolo":"Biologico: Bacillus cereus (spore nel farro sopravvivono alla cottura, producono tossina nel raffreddamento lento); Fisico: contaminazione crociata da utensili del pollo crudo; Chimico: nessuno specifico","ccp":true,"misura":"Raffreddare il farro a ≤ 10°C entro 90 min (abbattitore o bagno acqua-ghiaccio); non accumulare in contenitori profondi chiusi; utensili separati tra farro e pollo crudo"},{"nome":"Assemblaggio insalata e servizio","pericolo":"Biologico: contaminazione crociata da utensili usati sul pollo crudo; Fisico: frammenti di osso nel pollo tagliato; Chimico: nessuno specifico","ccp":false,"misura":"Utensili separati e sanificati; ispezionare il pollo tagliato; servire entro 2h a T ambiente o 24h a ≤ 4°C"}]}},
  {"diabete":"La pasta di Gragnano IGP ha IG ≈ 45–50 grazie alla trafilatura al bronzo. Cuocere rigorosamente al dente riduce ulteriormente l'IG. Per l'ipertensione: il limone è ricco di vitamina C, flavonoidi e potassio; ridurre ulteriormente il burro a 30 g per 4 porzioni e privilegiare l'olio EVO. Per l'aterosclerosi: limitare il burro e privilegiare l'olio EVO; il limonene riduce la sintesi epatica del colesterolo inibendo la HMG-CoA reduttasi.","adattamenti":{"vegan":"Sostituire il burro con burro vegetale di cocco o margarina non idrogenata; sostituire il parmigiano con lievito alimentare (2 cucchiai).","lattosio":"Sostituire il burro con olio EVO (30 g); sostituire il parmigiano con parmigiano senza lattosio (stagionato ≥24 mesi).","celiaci":"Sostituire le linguine con linguine di riso o mais. La salsa al limone e burro è naturalmente GF.","halal":"Il burro è halal se di origine bovina non mista ad altri grassi.","kosher":"Il piatto è lattisinio (milchig) con burro e parmigiano. Non servire con carne."},"haccp":{"fasi":[{"nome":"Ricezione burro, parmigiano ed erbe aromatiche fresche","pericolo":"Biologico: Listeria nel burro non pastorizzato e muffe tossigene su erbe umide; Fisico: frammenti di erbe secche nelle confezioni; Chimico: aflatossine nel parmigiano mal conservato","ccp":false,"misura":"Confezioni integre; burro a ≤ 4°C; erbe colore brillante senza imbrunimento; parmigiano senza muffe anomale (nere interne)"},{"nome":"Stoccaggio refrigerato burro e formaggi","pericolo":"Biologico: Listeria monocytogenes (cresce a 4°C nei latticini); Chimico: irrancidimento del burro per ossidazione in presenza di luce e aria; Fisico: contaminazione crociata da prodotti crudi nel frigorifero","ccp":true,"misura":"Burro in contenitore chiuso opaco a ≤ 4°C; parmigiano in carta cerata nella zona latticini; usare entro 5 giorni dall'apertura; non conservare mai a T ambiente"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: insetti nelle linguine in confezioni danneggiate; muffe sulle erbe aromatiche secche in ambienti umidi; Chimico: ossidazione dell'olio EVO; degradazione degli aromi delle erbe aromatiche fresche se non refrigerate (timo, erba cipollina, prezzemolo hanno durata di soli 1–2 giorni a T ambiente); Fisico: frammenti di confezione nella pasta; corpi estranei nelle spezie","ccp":false,"misura":"Ingredienti a T ambiente: linguine di Gragnano IGP (confezione chiusa, T ≤ 20°C), olio EVO (buio e fresco). NOTA: le erbe aromatiche fresche (timo, erba cipollina, prezzemolo) NON possono essere stoccate a T ambiente — devono essere refrigerate a ≤ 4°C o in acqua fresca. Procedura FIFO: pasta: consumare entro 6 mesi dall'apertura; etichettare con data di apertura; ispezionare mensilmente per insetti"},{"nome":"Scioglimento burro con erbe aromatiche (T ≤ 130°C)","pericolo":"Chimico: formazione di acroleina e aldeidi tossiche se il burro brucia (punto di fumo ≈ 150°C); Fisico: schizzi di burro fuso caldo; Biologico: inattivazione Listeria residua nel burro","ccp":true,"misura":"Fuoco bassissimo; T ≤ 130°C; il burro deve rimanere giallo paglierino — se imbrunisce: scartare e ricominciare"},{"nome":"Cottura linguine al dente","pericolo":"Fisico: corpi estranei nella pasta cruda; Biologico: ricontaminazione da utensili; Chimico: nessuno specifico","ccp":false,"misura":"Ispezionare la pasta cruda; acqua a forte ebollizione; colino pulito; aggiungere il limone fuori fuoco per preservare vitamina C e limonene"},{"nome":"Servizio immediato","pericolo":"Biologico: raffreddamento in zona di pericolo se il piatto attende; Fisico: nessuno; Chimico: nessuno specifico","ccp":false,"misura":"Servire immediatamente a T > 65°C in piatti preriscaldati; non mantenere in caldo oltre 30 min"}]}},
  {"diabete":"Le lenticchie verdi hanno IG ≈ 29 e GL ≈ 5 per porzione. Il carciofo contiene inulina che non alza la glicemia. La cicoria contiene acido cicorico che migliora la sensibilità insulinica. Le fibre solubili dei tre vegetali principali agiscono sinergicamente. Per l'ipertensione: il potassio è altissimo (lenticchie: 955 mg/100 g; carciofi: 370 mg/100 g; cicoria: 420 mg/100 g); il piatto è ideale per una dieta DASH. Per l'aterosclerosi: le lenticchie riducono colesterolo totale e LDL; i carciofi aumentano le HDL.","adattamenti":{"vegan":"Il piatto è già completamente vegano. Assicurarsi che il brodo vegetale non contenga estratto di carne.","lattosio":"Il piatto è naturalmente privo di lattosio. Nessuna modifica.","celiaci":"Sostituire i crostini di pane integrale con crostini di pane di riso, mais o grano saraceno certificato GF.","halal":"Il piatto è naturalmente halal.","kosher":"Il piatto è parve e naturalmente kosher."},"haccp":{"fasi":[{"nome":"Ricezione lenticchie verdi secche, carciofi e cicoria selvatica","pericolo":"Fisico: sassolini nelle lenticchie sfuse (rischio rottura dentale); Biologico: aflatossine e ocratossina A nelle lenticchie umide mal conservate; Chimico: residui di pesticidi su carciofi e cicoria convenzionali","ccp":false,"misura":"Selezione visiva delle lenticchie (eliminare sassolini); lenticchie asciutte senza aggregati; preferire carciofi Paestum IGP e cicoria biologica; lavaggio accurato"},{"nome":"Stoccaggio refrigerato carciofi puliti e cicoria sbollentata","pericolo":"Biologico: Listeria monocytogenes sulle superfici tagliate dei carciofi (psicrotrofa, cresce fino a 0°C); Chimico: ossidazione fenolica dei carciofi (imbrunimento, degradazione cinarina) a T ambiente; Fisico: contaminazione crociata nel frigorifero","ccp":true,"misura":"Carciofi tagliati in acqua acidulata con limone a ≤ 4°C; consumare entro 12h; cicoria sbollentata in contenitore chiuso a ≤ 4°C; consumare entro 24h; ripiano separato da prodotti animali crudi"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: aflatossine e insetti (Callosobruchus — tonchio) nelle lenticchie sfuse in ambienti umidi; muffe sul pane integrale per crostini in confezioni aperte; Chimico: ossidazione dell'olio EVO; degradazione dell'acido cicorico nella cicoria secca se esposta a luce UV; Fisico: sassolini nelle lenticchie sfuse; corpi estranei nel pane integrale in confezioni non sigillate","ccp":false,"misura":"Ingredienti a T ambiente: lenticchie verdi secche (contenitore ermetico, T ≤ 20°C, umidità < 60%), olio EVO (buio e fresco), rosmarino e peperoncino secchi (contenitori ermetici). Procedura FIFO: etichettare con data di apertura; lenticchie: verificare mensilmente per insetti; consumare entro 12 mesi; pane integrale per crostini: consumare entro 3 giorni dall'apertura o surgelare"},{"nome":"Sbollentatura cicoria selvatica (2–3 min, ebollizione)","pericolo":"Biologico: inattivazione E. coli e Listeria superficiali; Chimico: riduzione ossalati solubili (500–800 mg/100 g nella cicoria — tossici ad alte concentrazioni) e dell'amaro eccessivo; Fisico: residui di terriccio e insetti non rimossi nel lavaggio","ccp":true,"misura":"Ebollizione ≥ 100°C per 2–3 min; raffreddare in acqua ghiacciata (mantiene colore e blocca cottura); strizzare energicamente; non riutilizzare l'acqua di sbollentatura"},{"nome":"Cottura zuppa lenta (35–40 min, T ≥ 95°C)","pericolo":"Biologico: lectine fitoemagglutinine nelle lenticchie se cottura insufficiente (causano intossicazione acuta); Fisico: sassolini residui non rilevati; Chimico: prodotti di ossidazione nel brodo se riscaldato più volte","ccp":true,"misura":"Ebollizione leggera costante (T ≥ 95°C) per ≥ 35 min; le lenticchie devono sfaldarsi al cucchiaio (indicatore visivo di inattivazione lectine); brodo fresco; non riutilizzare brodo di cottura precedente"},{"nome":"Tostatura crostini e servizio","pericolo":"Chimico: formazione di acrilammide nel pane integrale tostato a T > 180°C (l'asparagina reagisce con glucosio via Maillard); Fisico: crostini troppo duri (rischio schegge); Biologico: ricontaminazione post-tostatura","ccp":true,"misura":"Tostatura a T ≤ 180°C; colore dorato chiaro; servire zuppa a T ≥ 75°C; crostini separati fino al momento del consumo"}]}},
  {"diabete":"La pasta integrale ha IG ≈ 40–45. Le zucchine sono ipoglicemizzanti (IG ≈ 15). Le cucurbitacine delle zucchine mostrano in studi in vitro un miglioramento della sensibilità insulinica. Per l'ipertensione: le zucchine sono ricche di potassio (264 mg/100 g) e povere di sodio; limitare l'aggiunta di sale; il provolone contiene sodio — ridurre a 30 g per 4 porzioni. Per l'aterosclerosi: la pasta integrale apporta steroli vegetali; l'aglio riduce la sintesi del colesterolo epatico e l'aggregazione piastrinica.","adattamenti":{"vegan":"Omettere provolone del Monaco e parmigiano. Sostituire con: 3 cucchiai di lievito alimentare in scaglie + 30 g di anacardi tostati e frullati per la cremosità.","lattosio":"Sostituire provolone del Monaco con formaggio stagionato senza lattosio (stagionatura ≥12 mesi).","celiaci":"Sostituire la pasta integrale con pasta integrale di riso, mais o legumi GF.","halal":"Il provolone del Monaco deve essere prodotto con caglio halal (vegetale o microbico).","kosher":"Il piatto è lattisinio (milchig) con i formaggi. Non servire con carne."},"haccp":{"fasi":[{"nome":"Ricezione zucchine fresche e provolone del Monaco DOP","pericolo":"Biologico: Listeria nelle zucchine a contatto con suolo; Staphylococcus aureus nel provolone a crosta danneggiata; Fisico: terra e residui vegetali sulle zucchine; Chimico: residui di pesticidi sulle zucchine convenzionali","ccp":false,"misura":"Zucchine sode, lucide, senza ammaccature; provolone con crosta asciutta e integra; preferire zucchine km0 o biologiche; lavaggio accurato con sfregamento"},{"nome":"Stoccaggio refrigerato (zucchine tagliate e provolone)","pericolo":"Biologico: moltiplicazione Listeria sulle zucchine tagliate e S. aureus nel provolone a T ambiente; Chimico: irrancidimento dei grassi del provolone esposto a luce e calore; Fisico: contaminazione crociata tra formaggio e verdure crude","ccp":true,"misura":"Zucchine tagliate: contenitore chiuso a ≤ 4°C, usare entro 24h; provolone: carta cerata nella zona formaggi a ≤ 8°C, consumare entro 5 giorni; non conservare provolone tagliato a T ambiente"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: insetti nella pasta integrale in confezioni danneggiate; muffe sull'aglio fresco in ambienti umidi e caldi; Chimico: ossidazione dell'olio di arachide per frittura in contenitori non chiusi o esposti a luce (l'olio di arachide raffinato è stabile ma si degrada se esposto ripetutamente a luce e aria); Fisico: frammenti di confezione nella pasta; corpi estranei nell'olio","ccp":false,"misura":"Ingredienti a T ambiente: pasta integrale (contenitore ermetico, T ≤ 20°C), olio di arachide per frittura (buio, fresco, T ≤ 20°C — non riutilizzare oltre 3 cicli), olio EVO a crudo (buio e fresco), aglio (luogo asciutto ventilato). Procedura FIFO: etichettare con data di apertura; olio di arachide: annotare il numero di utilizzi sul contenitore; pasta integrale: consumare entro 3 mesi dall'apertura; ruotare sempre le scorte (vecchio davanti)"},{"nome":"Frittura zucchine in olio di arachide (T ≤ 180°C)","pericolo":"Chimico: degradazione termica dell'olio con aldeidi tossiche, acroleina e composti polari totali (CPT — limite legale ≤ 25%, D.Lgs. 183/2003); Fisico: schizzi olio bollente per umidità residua; Biologico: inattivazione Listeria e batteri","ccp":true,"misura":"T olio monitorata con termometro a sonda (≤ 180°C); sostituire olio dopo 3 cicli o se scurisce/fuma; asciugare le zucchine prima di friggerle; scolare su carta assorbente immediatamente; non aggiungere mai olio fresco all'esausto"},{"nome":"Cottura pasta integrale al dente","pericolo":"Fisico: corpi estranei nella pasta cruda; Biologico: recontaminazione da utensili non sanificati; Chimico: nessuno specifico","ccp":false,"misura":"Ispezionare la pasta cruda; acqua a forte ebollizione; colino pulito; riservare 1 mestolo acqua di cottura per la mantecatura"},{"nome":"Mantecatura con provolone fuori fuoco e servizio","pericolo":"Biologico: Listeria residua nel provolone se T mantecatura < 70°C; Fisico: frammenti di crosta del provolone; Chimico: ossidazione olio EVO se aggiunto a T > 80°C","ccp":true,"misura":"T pasta alla mantecatura ≥ 70°C (inattiva Listeria nel provolone); rimuovere la crosta prima della julienne; olio EVO fuori fuoco; servire immediatamente"}]}},
  {"diabete":"La pasta di semola rimacinata ha IG \u2248 45 se cotta al dente. Il Pomodorino del Piennolo DOP è a basso contenuto di zuccheri semplici. Per l'ipertensione: i pomodorini apportano potassio (237 mg/100 g) e licopene che riduce la rigidità arteriosa; le melanzane contengono nasunina con effetto vasodilatatorio. Per l'aterosclerosi: l'olio EVO DOP Sorrento apporta oleocantale con effetto antinfiammatorio. Evitare eccessivo consumo dell'olio di frittura.","adattamenti":{"vegan":"Il piatto è già completamente vegano. Verificare che la semola non contenga additivi di origine animale.","lattosio":"Il piatto è naturalmente privo di lattosio. Nessuna modifica.","celiaci":"Il piatto contiene glutine (semola). Non adatto a celiaci nella versione originale. Sostituire con pasta di riso o mais gluten-free.","halal":"Il piatto è naturalmente halal. L'olio di girasole e gli ingredienti vegetali non hanno restrizioni.","kosher":"Il piatto è parve e naturalmente kosher."},"haccp":{"fasi":[{"nome":"Ricezione semola e pomodorini del Piennolo DOP","pericolo":"Biologico: aflatossine nella semola umida mal conservata; muffe tossigene su pomodorini ammaccati · Chimico: residui di pesticidi; micotossine · Fisico: sassolini nella semola sfusa; frammenti di imballaggio","ccp":true,"misura":"Semola in confezione integra e asciutta; pomodorini sodi senza ammaccature; preferire DOP certificati; verifica lotto e scadenza; rifiutare semola con odore di muffa o confezione danneggiata; registrare fornitore e lotto"},{"nome":"Stoccaggio a T controllata — frigorifero (pasta fresca)","pericolo":"Biologico: proliferazione batterica sulla pasta fresca (Aw > 0.95) · Chimico: nessuno · Fisico: contaminazione crociata da altri alimenti","ccp":true,"misura":"Pasta fresca a T ≤ 4°C; consumare entro 2h dalla preparazione oppure abbattere a -18°C; mai lasciare pasta fresca a T ambiente oltre 30 min"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: insetti nella semola in confezioni danneggiate; muffe sull'aglio in ambienti umidi · Chimico: ossidazione olio EVO; degradazione olio di girasole in contenitori non chiusi · Fisico: corpi estranei nella semola sfusa","ccp":false,"misura":"Semola in contenitore ermetico a T ≤ 20°C; olio EVO in contenitore opaco chiuso; olio girasole in luogo fresco. Procedura FIFO: semola aperta: consumare entro 3 mesi; olio EVO: entro 2 mesi; ruotare le scorte"},{"nome":"Impasto e formatura scialatielli","pericolo":"Biologico: contaminazione da superfici non sanificate; batteri da mani non lavate · Chimico: residui di detergente su piano lavoro · Fisico: frammenti di gioielli o unghie nell'impasto","ccp":false,"misura":"Piano lavoro sanificato; lavaggio mani; non indossare anelli/bracciali; lavorazione rapida (< 20 min)"},{"nome":"Frittura melanzane (T olio 175°C)","pericolo":"Biologico: inattivazione batteri superficiali · Chimico: degradazione termica olio (acroleina, composti polari totali CPT > 25% D.Lgs. 183/2003) · Fisico: schizzi olio caldo per umidità melanzane","ccp":true,"misura":"T olio monitorata con termometro a sonda (175°C ± 5°C); asciugare melanzane prima di friggerle; sostituire olio dopo 3 cicli o se scurisce/fuma; scolare immediatamente su carta assorbente"},{"nome":"Cottura salsa e pasta","pericolo":"Biologico: contaminazione crociata tra pasta cruda e salsa; sopravvivenza patogeni se T insufficiente · Chimico: nessuno · Fisico: corpi estranei nella pasta","ccp":true,"misura":"Acqua a forte ebollizione ≥ 100°C; salsa pomodorino a T ≥ 85°C per almeno 10 min; colino pulito; T interna pasta ≥ 75°C; servire immediatamente a T > 65°C"},{"nome":"Impiattamento e servizio","pericolo":"Biologico: raffreddamento rapido in zona pericolo · Chimico: nessuno · Fisico: nessuno","ccp":false,"misura":"Servire immediatamente; aggiungere melanzane croccanti nel piatto al momento del servizio; non mantenere in caldo oltre 20 min"}]}},
  {"diabete":"Il tonno è privo di carboidrati: GL = 0. Le verdure di accompagnamento hanno IG bassissimo. Per l'ipertensione: il tonno è ricco di potassio e Omega-3 che abbassano la pressione sistolica; il limone di Sorrento IGP apporta bioflavonoidi con effetto ACE-inibitore. Attenzione al sesamo: è ricco di sodio. Per l'aterosclerosi: gli Omega-3 EPA e DHA del tonno riducono i trigliceridi plasmatici fino al 30% e aumentano le HDL.","adattamenti":{"vegan":"Sostituire il tonno con 2 x 150 g di melanzane grigliate in crosta di sesamo + 100 g di tofu affumicato a fette. L'aria al limone rimane identica.","lattosio":"Il piatto è naturalmente privo di lattosio. Nessuna modifica.","celiaci":"Il piatto è naturalmente senza glutine. Verificare che la lecitina di soia non contenga tracce di glutine.","halal":"Il tonno è halal. Tutti gli altri ingredienti sono naturalmente halal.","kosher":"Il tonno è kosher (ha pinne e squame). Il piatto è parve."},"haccp":{"fasi":[{"nome":"Ricezione tonno fresco (abbattuto a -18°C)","pericolo":"Biologico: Anisakis simplex (larve parassitarie) nel tonno non abbattuto; istamina (Scombridae — alto rischio) · Chimico: PCB e mercurio · Fisico: frammenti di lisca nel filetto","ccp":true,"misura":"Verifica certificato abbattimento -18°C/24h; T ricezione ≤ -18°C; carne rosso rubino compatta, odore marino neutro; candling per Anisakis; rifiutare se T > -15°C o odore anomalo"},{"nome":"Stoccaggio a T controllata — frigorifero (scongelamento)","pericolo":"Biologico: proliferazione batterica e formazione di istamina se scongelamento avviene a T > 4°C · Chimico: ossidazione Omega-3 con produzione di perossidi · Fisico: lische che si ammorbidiscono","ccp":true,"misura":"Scongelamento in frigorifero a ≤ 4°C per 12–18h; mai a T ambiente; usare entro 6h dallo scongelamento; contenitore chiuso nel ripiano inferiore"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: muffe sulla lecitina di soia in confezioni aperte; insetti nei semi di sesamo sfusi · Chimico: ossidazione olio EVO; irrancidimento sesamo in confezioni aperte · Fisico: corpi estranei nei semi di sesamo sfusi","ccp":false,"misura":"Lecitina di soia in contenitore ermetico; sesamo in contenitore chiuso a T ≤ 20°C lontano da fonti di calore; olio EVO in contenitore opaco. Procedura FIFO: sesamo aperto: consumare entro 3 mesi; olio EVO: entro 2 mesi; etichettare con data apertura"},{"nome":"Preparazione aria al limone (a freddo)","pericolo":"Biologico: contaminazione da minipimer non sanificato · Chimico: nessuno · Fisico: schizzi durante l'emulsificazione","ccp":false,"misura":"Minipimer sanificato; usare l'aria entro 30 min; non esporre a T > 20°C (la schiuma collassa)"},{"nome":"Panatura in sesamo e scottatura tonno (45–60 sec/lato)","pericolo":"Biologico: temperatura interna insufficiente per l'interno rosa (non richiesto se il pesce è stato abbattuto) · Chimico: acroleina se sesamo brucia · Fisico: lische residue nel filetto","ccp":true,"misura":"Padella a T massima (> 220°C); 45–60 sec per lato; l'esterno deve essere sigillato e il sesamo dorato non scuro; ispezionare il filetto per lische prima della panatura"},{"nome":"Impiattamento e servizio","pericolo":"Biologico: contaminazione crociata tra tonno e verdure crude · Chimico: nessuno · Fisico: nessuno","ccp":false,"misura":"Utensili separati per verdure e tonno; servire entro 5 min; aggiungere l'aria al limone nell'ultimo momento"}]}},
  {"diabete":"La seppia non contiene carboidrati: GL = 0. Le zucchine hanno IG ≈ 15. Le noci migliorano la sensibilità insulinica. Per l'ipertensione: la seppia è ricca di potassio e povera di sodio; i polifenoli dell'olio EVO DOP Terra di Bari riducono la pressione sistolica. Per l'aterosclerosi: l'olio EVO DOP apporta oleocantale e oleaceina con effetti antinfiammatori documentati; i fitosteroli delle noci riducono l'assorbimento intestinale del colesterolo.","adattamenti":{"vegan":"Sostituire la seppia con 300 g di cuori di palma tagliati a listarelle e brevemente marinati in succo di limone + alga nori sbriciolata per il sapore marino. Omettere il Parmigiano dal pesto (sostituire con 2 cucchiai di lievito alimentare).","lattosio":"Omettere il Parmigiano Reggiano DOP dal pesto o sostituire con Parmigiano stagionato ≥ 24 mesi (naturalmente privo di lattosio). Il resto del piatto è naturalmente privo di lattosio.","celiaci":"Il piatto è naturalmente senza glutine. Verificare che il Parmigiano DOP non contenga addensanti con glutine.","halal":"La seppia è halal nella maggior parte delle scuole islamiche. Tutti gli altri ingredienti sono naturalmente halal.","kosher":"La seppia (mollusco) NON è kosher. Sostituire con 500 g di filetti di merluzzo o halibut cotti al vapore e tagliati a striscioline."},"haccp":{"fasi":[{"nome":"Ricezione seppie fresche","pericolo":"Biologico: Vibrio parahaemolyticus e batteri putrefattivi; Anisakis simplex · Chimico: metalli pesanti bioaccumulati · Fisico: residui di sabbia e conchiglie nell'addome","ccp":true,"misura":"T ricezione ≤ 2°C; odore marino fresco neutro; colore bianco-rosato; rifiutare se odore di ammoniaca o colore grigiastro; verificare pulizia interna"},{"nome":"Stoccaggio a T controllata — frigorifero (CCP)","pericolo":"Biologico: Vibrio (psicrotrofo, cresce fino a 0°C) e Listeria · Chimico: ossidazione proteica · Fisico: gocciolamento su altri alimenti","ccp":true,"misura":"T 0–2°C in contenitore ermetico; ripiano inferiore dedicato al pesce; consumare entro 24h; non tenere a T ambiente oltre 30 min"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: muffe sulle noci in confezioni aperte; insetti nell'olio EVO in contenitori non chiusi · Chimico: irrancidimento noci per ossidazione degli Omega-3; ossidazione olio EVO DOP · Fisico: frammenti di guscio nelle noci sfuse","ccp":false,"misura":"Noci in contenitore ermetico a T ≤ 20°C lontano da fonti di calore e luce; olio EVO in contenitore opaco chiuso; Parmigiano in frigorifero. Procedura FIFO: noci aperte: consumare entro 1 mese; olio EVO: entro 2 mesi dall'apertura; etichettare con data"},{"nome":"Sbianchitura seppie (1–2 min acqua bollente) — CCP","pericolo":"Biologico: Vibrio e Listeria; inattivazione richiede T interna ≥ 70°C · Chimico: nessuno · Fisico: residui di sabbia e conchiglie","ccp":true,"misura":"Acqua a ebollizione ≥ 100°C; immersione 1–2 min da ripresa bollore; le seppie devono diventare bianche opache; raffreddare immediatamente in acqua ghiacciata"},{"nome":"Preparazione carpaccio zucchine e pesto a freddo","pericolo":"Biologico: Listeria sulle superfici tagliate delle zucchine · Chimico: ossidazione del pesto a T ambiente · Fisico: frammenti di guscio nelle noci; schegge dalla mandolina","ccp":false,"misura":"Mandolina pulita (guanti antitaglio); zucchine in contenitore chiuso a ≤ 4°C se non usate subito; pesto in contenitore chiuso con pellicola a contatto"},{"nome":"Assemblaggio e conservazione a freddo — CCP","pericolo":"Biologico: proliferazione batterica (Listeria, Vibrio) nel piatto assemblato a T > 4°C · Chimico: ossidazione degli acidi grassi delle noci · Fisico: frammenti di guscio non rilevati","ccp":true,"misura":"T cucina < 20°C durante assemblaggio; servire entro 30 min dall'assemblaggio; se conservato: contenitore chiuso a ≤ 4°C; non superare 2h a T ambiente"},{"nome":"Servizio","pericolo":"Biologico: contaminazione post-preparazione · Chimico: nessuno · Fisico: frammenti di guscio di noce residui","ccp":false,"misura":"Ispezionare visivamente ogni porzione; utensili dedicati; servire su piatti freddi (non riscaldati)"}]}},
  {"diabete":"Il polpo è privo di carboidrati: GL = 0. La porzione ridotta di crema di patate (~100 g/pax) e le proteine del polpo rallentano l’assorbimento del glucosio. Per l’ipertensione: il polpo è ricco di potassio (250 mg/100 g) e magnesio vasodilatatori; ridurre il sale nella crema. Per l’aterosclerosi: l’olio EVO Penisola Sorrentina DOP apporta oleocantale con azione anti-infiammatoria riconosciuta dall’EFSA; le proteine magre del polpo non contribuiscono all’accumulo di grassi aterogenici.","adattamenti":{"vegan":"Sostituire il polpo con 600 g di cuori di carciofo di Paestum IGP grigliati o funghi Portobello (180 g/pax). La maionese va sostituita con maionese vegana preparata con acquafaba (acqua di cottura ceci, 50 ml). La crema di patate rimane invariata.","lattosio":"Il piatto è naturalmente privo di lattosio. Nessuna modifica.","celiaci":"Naturalmente senza glutine. Verificare che la senape non contenga amido di frumento (leggere etichetta).","halal":"Il polpo è halal (Shafi’i, Hanbali, Maliki). Tutti gli altri ingredienti sono naturalmente halal.","kosher":"Il polpo NON è kosher. Sostituire con 600 g di filetti di spigola o cernia grigliata."},"haccp":{"fasi":[{"nome":"Ricezione polpo fresco km0","pericolo":"Biologico: Vibrio parahaemolyticus e Salmonella spp.; Fisico: frammenti di becco corneo; Chimico: metalli pesanti bioaccumulati","ccp":true,"misura":"T ricezione ≤ 2°C; odore marino fresco, colore grigio-viola, consistenza ferma; certificato sanitario; rifiutare se T > 4°C o odore anomalo"},{"nome":"Stoccaggio refrigerato polpo crudo","pericolo":"Biologico: moltiplicazione Vibrio; Fisico: contaminazione crociata; Chimico: ossidazione con odori ammoniacali","ccp":true,"misura":"T 0–2°C in contenitore ermetico; ripiano più basso dedicato al pesce; consumare entro 24h o abbattere a -18°C"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: muffe su uova a T elevata; Chimico: ossidazione olio EVO in contenitori trasparenti; irrancidimento senape; Fisico: corpi estranei","ccp":false,"misura":"Olio EVO in contenitore opaco chiuso a T ≤ 20°C; senape chiusa, consumare entro 2 mesi. Uova in frigorifero a ≤ 4°C. Erbe fresche refrigerate. Procedura FIFO con etichettatura data apertura"},{"nome":"Bollitura polpo (40–50 min, fuoco basso)","pericolo":"Biologico: Vibrio e Salmonella se T interna insufficiente; Anisakis (muore a ≥ 60°C); Fisico: frammenti becco corneo","ccp":true,"misura":"T interna ≥ 75°C per 2 min (termometro a sonda); carne rosa-opaca; rimuovere becco corneo prima del servizio"},{"nome":"Preparazione crema di patate","pericolo":"Biologico: Bacillus cereus nelle patate schiacciate a T ambiente; Fisico: residui buccia; Chimico: solanina in patate con parti verdi","ccp":true,"misura":"Patate senza parti verdi; raffreddare crema a ≤ 10°C entro 90 min; non tenere a T ambiente oltre 2h; servire a T > 65°C"},{"nome":"Preparazione maionese di polpo (uova crude)","pericolo":"Biologico: Salmonella Enteritidis nelle uova crude; Fisico: frammenti di guscio","ccp":true,"misura":"CRITICO: usare SOLO uova pastorizzate OPPURE conservare a ≤ 4°C e consumare entro 24h; mai conservare la maionese a T ambiente"},{"nome":"Grigliatura tentacoli (3–4 min/lato)","pericolo":"Biologico: ricontaminazione da griglia non sanificata; Chimico: IPA da grasso su brace viva; Fisico: residui carbone","ccp":true,"misura":"Griglia sanificata e preriscaldata ≥ 250°C; evitare fiamme dirette; non carbonizzare; servire immediatamente"},{"nome":"Impiattamento e servizio","pericolo":"Biologico: proliferazione batterica maionese a T ambiente; Fisico: becco corneo residuo","ccp":false,"misura":"Maionese a ≤ 4°C fino all’impiattamento; sac-à-poche pulito; servire immediatamente a T > 65°C"}]}},
  {"diabete":"La delizia al limone è un dolce e come tale va consumato con moderazione da chi soffre di diabete tipo 2 (GL elevato per porzione). Il limone di Sorrento IGP apporta però limonene e flavonoidi che migliorano la sensibilità insulinica. Per l'ipertensione: ridurre la porzione a metà delizia; il potassio del limone IGP bilancia parzialmente il sodio. Per l'aterosclerosi: il burro apporta grassi saturi — preferire una versione alleggerita sostituendo parte della panna con yogurt greco magro. La crema pasticcera homemade non contiene grassi idrogenati né additivi industriali: profilo molto migliore dei dolci da pasticceria industriale.","adattamenti":{"vegan":"Sostituire le uova con 40 g di aquafaba per la crema (parzialmente); sostituire latte e panna con latte di cocco e panna di cocco; sostituire il burro con margarina vegetale non idrogenata. Il risultato sarà meno cremoso ma accettabile.","lattosio":"Sostituire latte intero con latte senza lattosio; sostituire la panna con panna senza lattosio (disponibile in commercio); sostituire il burro con burro senza lattosio o olio di cocco.","celiaci":"Sostituire la farina 00 con farina di riso (60 g) per la crema pasticcera e per il pan di Spagna. Verificare che l'amido di mais sia certificato GF (può contenere tracce di glutine da contaminazione crociata).","halal":"Il limoncello PAT contiene alcool — omettere o sostituire con succo di limone concentrato + scorza extra. Tutti gli altri ingredienti sono naturalmente halal.","kosher":"Il piatto è lattisinio (milchig) con burro, latte, panna e uova. Non servire con carne. Tutti i latticini devono essere kosher certificati."},"haccp":{"fasi":[{"nome":"Ricezione uova fresche e latticini","pericolo":"Biologico: Salmonella Enteritidis nelle uova con guscio rotto; Listeria monocytogenes nella panna pastorizzata aperta · Chimico: aflatossine nel burro mal conservato · Fisico: frammenti di guscio nelle uova","ccp":true,"misura":"Uova con guscio integro, codice produttore visibile; panna con data scadenza; burro a T ≤ 4°C in confezione integra; rifiutare uova con guscio rotto o sporco di sangue; conservare subito in frigorifero"},{"nome":"Stoccaggio a T controllata — frigorifero (CCP)","pericolo":"Biologico: Salmonella nelle uova; Listeria nella panna aperta; Bacillus cereus nella crema pasticcera raffreddata lentamente · Chimico: irrancidimento del burro · Fisico: contaminazione crociata","ccp":true,"misura":"Uova a T ≤ 4°C lontane da alimenti pronti; panna aperta a T ≤ 4°C consumare entro 24h; crema pasticcera: raffreddare a ≤ 10°C entro 90 min (bagno ghiacciato); conservare a ≤ 4°C con pellicola a contatto; consumare entro 24h"},{"nome":"Stoccaggio a T ambiente — dispensa (ingredienti non deperibili)","pericolo":"Biologico: muffe nella farina in confezioni aperte; insetti nell'amido di mais · Chimico: ossidazione del limoncello PAT in bottiglia aperta; degradazione degli aromi · Fisico: corpi estranei nella farina sfusa","ccp":false,"misura":"Farina e amido in contenitori ermetici a T ≤ 20°C; limoncello PAT in bottiglia chiusa lontano da fonti di calore; zucchero in contenitore chiuso. Procedura FIFO: farina aperta: consumare entro 3 mesi; limoncello: consumare entro 6 mesi dall'apertura"},{"nome":"Preparazione crema pasticcera (cottura a fuoco dolce)","pericolo":"Biologico: Salmonella nelle uova crude — inattivazione richiede T ≥ 75°C · Chimico: formazione di prodotti di degradazione delle proteine se cottura eccessiva · Fisico: grumi nella crema per temperature non uniformi","ccp":true,"misura":"T crema ≥ 75°C per ≥ 2 min (termometro a sonda obbligatorio); mescolamento continuo; la crema deve velare il cucchiaio; raffreddare immediatamente con pellicola a contatto"},{"nome":"Cottura pan di Spagna (175°C, 15 min)","pericolo":"Biologico: inattivazione Salmonella nelle uova dell'impasto · Chimico: formazione acrilammide se T eccessiva · Fisico: nessuno","ccp":true,"misura":"T forno 175°C; T interna ≥ 85°C (stecchino asciutto); non superate 180°C; colore dorato non scuro"},{"nome":"Montatura panna e aggiunta limoncello PAT","pericolo":"Biologico: Listeria nella panna; moltiplicazione batterica se la panna non è fredda · Chimico: ossidazione della panna a T ambiente · Fisico: schizzi durante la montatura","ccp":true,"misura":"Panna a T ≤ 4°C prima della montatura (frusta e ciotola fredde); aggiungere il limoncello PAT SEMPRE a freddo; consumare entro 4h dalla preparazione"},{"nome":"Assemblaggio e conservazione delizie","pericolo":"Biologico: proliferazione batterica nelle delizie a T ambiente; Listeria nella crema · Chimico: nessuno · Fisico: frammenti di scorza di limone","ccp":true,"misura":"Assemblare in ambiente fresco (T cucina < 20°C); conservare in frigorifero a ≤ 4°C; consumare entro 24h; non esporre mai a T ambiente oltre 1h"}]}},
  {"diabete":"Il risotto ha GL moderato (≈ 22). I gamberi non contengono carboidrati e abbassano il carico glicemico del pasto. La presenza di proteine dei gamberi rallenta l'assorbimento del glucosio. Per l'ipertensione: i gamberi sono naturalmente a basso contenuto di sodio; non aggiungere sale in eccesso; il limone di Sorrento IGP sostituisce il sale come esaltatore di sapidità. Per l'aterosclerosi: il burro nella mantecatura va ridotto a 10 g per porzione; l'olio EVO DOP apporta acido oleico e polifenoli cardioprotettivi; i gamberi hanno bassissimo contenuto di grassi saturi.","adattamenti":{"vegan":"Sostituire i gamberi con 300 g di zucchine grigliate + 100 g di ceci e preparare un brodo vegetale con sedano, carota, cipolla e alga kombu per il sapore marino. Sostituire il burro con olio EVO a crudo.","lattosio":"Sostituire il burro con olio EVO (15 g) per la mantecatura. Il risultato è meno cremoso ma più leggero. Tutti gli altri ingredienti sono naturalmente privi di lattosio.","celiaci":"Il piatto è naturalmente senza glutine. Il riso carnaroli è GF. Verificare che il vino bianco non contenga additivi con glutine.","halal":"I gamberi sono halal. Verificare che il vino bianco usato per sfumare sia permesso o sostituire con brodo vegetale + succo di limone.","kosher":"I gamberi (crostacei) NON sono kosher. Sostituire con 400 g di filetti di merluzzo o spigola a cubetti. Il piatto diventa parve."},"haccp":{"fasi":[{"nome":"Ricezione gamberi freschi km0","pericolo":"Biologico: Vibrio parahaemolyticus e Salmonella; solfiti come conservante (dichiarazione obbligatoria) · Chimico: solfiti in eccesso (reazione allergica in soggetti sensibili) · Fisico: antenne, chele, frammenti di guscio","ccp":true,"misura":"T ricezione ≤ 2°C; carne traslucida grigio-rosata, odore marino fresco; verifica etichetta solfiti; rifiutare se T > 4°C o annerimento della testa; consumare entro 24h"},{"nome":"Stoccaggio a T controllata — frigorifero (CCP)","pericolo":"Biologico: Vibrio (psic /* ══ RENDER HACCP ══════════════════════════════════════ */
let currentHaccpFilter = 'all';
function buildHaccpDiagram(fasi) {
  // Classify fasi into categories
  const ricezione   = fasi.find(f => f.nome.toLowerCase().includes('ricezion'));
  const stocRef     = fasi.find(f => f.nome.toLowerCase().includes('stoccaggio') && !f.nome.toLowerCase().includes('dispensa'));
  const stocDisp    = fasi.find(f => f.nome.toLowerCase().includes('dispensa'));
  const remaining   = fasi.filter(f => f !== ricezione && f !== stocRef && f !== stocDisp);

  // Layout constants
  const W = 620, BW = 170, BH = 38, BRX = 6;
  const CX = W/2;       // center x
  const LX = 150;       // left branch center x (T controllata)
  const RX = 450;       // right branch center x (T non controllata)
  const COLORS = { ccp:'#e74c3c', cp:'#2C3E50', fifo:'#e67e22', text:'#1a1a2e' };

  let y = 20;
  let svgContent = '';

  // helper: wrap text into lines
  function wrapText(txt, maxW, fontSize) {
    const words = txt.split(' ');
    const lines = []; let cur = '';
    const charPx = fontSize * 0.55;
    words.forEach(w => {
      const test = cur ? cur+' '+w : w;
      if (test.length * charPx > maxW - 10) { lines.push(cur); cur = w; }
      else cur = test;
    });
    if (cur) lines.push(cur);
    return lines;
  }

  // helper: draw box (rect or ellipse)
  function box(cx, cy, w, h, label, color, shape='rect', badge='') {
    const lines = wrapText(label, w, 10);
    const lineH = 13;
    const textH = lines.length * lineH;
    const bh = Math.max(h, textH + 14);
    let el = '';
    if (shape === 'ellipse') {
      el = `<ellipse cx="${cx}" cy="${cy}" rx="${w/2}" ry="${bh/2}" fill="white" stroke="${color}" stroke-width="1.5"/>`;
    } else {
      el = `<rect x="${cx-w/2}" y="${cy-bh/2}" width="${w}" height="${bh}" rx="${BRX}" fill="white" stroke="${color}" stroke-width="${color===COLORS.ccp?2:1.5}" stroke-dasharray="${badge==='fifo'?'5,3':'none'}"/>`;
    }
    const ty = cy - (lines.length-1)*lineH/2;
    const textEls = lines.map((l,i)=>`<text x="${cx}" y="${ty + i*lineH}" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="${COLORS.text}" font-weight="${color===COLORS.ccp?'600':'400'}">${l}</text>`).join('');
    let badgeEl = '';
    if (badge) {
      const bc = badge==='ccp'?COLORS.ccp : badge==='fifo'?COLORS.fifo : COLORS.cp;
      const bl = badge==='ccp'?'CCP' : badge==='fifo'?'CP·FIFO' : 'CP';
      badgeEl = `<rect x="${cx+w/2-32}" y="${cy-bh/2-1}" width="32" height="13" rx="2" fill="${bc}"/>
        <text x="${cx+w/2-16}" y="${cy-bh/2+9}" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="white" font-weight="700">${bl}</text>`;
    }
    return { svg: el+textEls+badgeEl, h: bh };
  }

  // helper: vertical arrow
  function arrow(x, y1, y2) {
    return `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2-6}" stroke="#888" stroke-width="1.2"/>
      <polygon points="${x-4},${y2-6} ${x+4},${y2-6} ${x},${y2}" fill="#888"/>`;
  }
  // helper: horizontal line
  function hline(x1,x2,y) {
    return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#888" stroke-width="1.2"/>`;
  }
  // helper: vertical line (no arrow)
  function vline(x,y1,y2) {
    return `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="#888" stroke-width="1.2"/>`;
  }

  // ── INGREDIENTI (oval top) ──
  const ingredH = 30;
  svgContent += box(CX, y+ingredH/2, 160, ingredH, 'INGREDIENTI', COLORS.cp, 'ellipse').svg;
  y += ingredH;

  // arrow down to ricezione
  svgContent += arrow(CX, y, y+25);
  y += 25;

  // ── RICEZIONE ──
  const rNome = ricezione ? ricezione.nome.toUpperCase() : 'RICEZIONE MATERIE PRIME';
  const rBadge = ricezione ? (ricezione.ccp ? 'ccp' : 'cp') : 'ccp';
  const rColor = ricezione?.ccp ? COLORS.ccp : COLORS.cp;
  const rBox = box(CX, y+BH/2, BW*1.4, BH, rNome, rColor, 'rect', rBadge);
  svgContent += rBox.svg;
  y += rBox.h;

  // ── SPLIT to two branches ──
  // horizontal line from center to left and right
  const splitY = y + 20;
  svgContent += vline(CX, y, splitY);
  svgContent += hline(LX, RX, splitY);
  svgContent += arrow(LX, splitY, splitY+20);
  svgContent += arrow(RX, splitY, splitY+20);
  y = splitY + 20;

  // ── LEFT BRANCH: stoccaggio T controllata ──
  const sNome = stocRef ? stocRef.nome.replace('Stoccaggio a T controllata — ','').replace('Stoccaggio refrigerato','Stoccaggio a T controllata').toUpperCase() : 'STOCCAGGIO A T CONTROLLATA';
  const sBox = box(LX, y+BH/2, BW, BH, sNome, COLORS.ccp, 'rect', 'ccp');
  svgContent += sBox.svg;
  const leftBranchEndY = y + sBox.h;

  // ── RIGHT BRANCH: stoccaggio T non controllata ──
  const dNome = stocDisp ? 'STOCCAGGIO A T NON CONTROLLATA (DISPENSA)' : 'STOCCAGGIO A T NON CONTROLLATA';
  const dBox = box(RX, y+BH/2, BW, BH, dNome, COLORS.fifo, 'rect', 'fifo');
  svgContent += dBox.svg;
  const rightBranchEndY = y + dBox.h;

  // optional scongelamento under left branch
  const maxBranchY = Math.max(leftBranchEndY, rightBranchEndY);
  const joinY = maxBranchY + 35;

  // arrows from branches down to join
  svgContent += vline(LX, leftBranchEndY, joinY);
  svgContent += vline(RX, rightBranchEndY, joinY);
  svgContent += hline(LX, RX, joinY);
  svgContent += arrow(CX, joinY, joinY+20);
  y = joinY + 20;

  // ── REMAINING PHASES ──
  remaining.forEach((f, fi) => {
    const fNome = f.nome.toUpperCase();
    const fColor = f.ccp ? COLORS.ccp : COLORS.cp;
    const fBadge = f.ccp ? 'ccp' : (f.nome.includes('dispensa') ? 'fifo' : 'cp');
    const fBox = box(CX, y+BH/2, BW*1.5, BH, fNome, fColor, 'rect', fBadge);
    svgContent += fBox.svg;
    y += fBox.h;
    // arrow (not after last)
    if (fi < remaining.length - 1) {
      svgContent += arrow(CX, y, y+18);
      y += 18;
    }
  });

  // ── SOMMINISTRAZIONE ──
  svgContent += arrow(CX, y, y+22);
  y += 22;
  const somBox = box(CX, y+BH/2, BW*1.3, BH, 'SOMMINISTRAZIONE', COLORS.cp, 'rect', 'cp');
  svgContent += somBox.svg;
  y += somBox.h;

  // ── PIATTO DA CONSUMARE (oval) ──
  svgContent += arrow(CX, y, y+20);
  y += 20;
  const finalH = 30;
  svgContent += box(CX, y+finalH/2, 160, finalH, 'PIATTO DA CONSUMARE', COLORS.cp, 'ellipse').svg;
  y += finalH + 15;

  return `<svg viewBox="0 0 ${W} ${y}" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width:620px;display:block;margin:0 auto;font-family:Arial,sans-serif">${svgContent}</svg>`;
}

function renderHaccp(filter) {
  currentHaccpFilter = filter;
  const grid = document.getElementById('haccp-grid');
  grid.innerHTML = '';
  data.filter(r => filter==='all' || r.cat===filter).forEach((r,i) => {
    const ex = extraData[r.id] || {};
    const haccp = ex.haccp || {fasi:[]};
    const adapt = ex.adattamenti || {};
    const diabete = ex.diabete || '';
    const flowHtml = haccp.fasi.map((f,fi) => {
      const isDispensa = f.nome.includes('dispensa');
      const badgeHtml = f.ccp
        ? `<span class="haccp-ccp-badge">CCP</span>`
        : isDispensa
          ? `<span class="haccp-fifo-badge">CP · FIFO</span>`
          : `<span class="haccp-ok-badge">CP</span>`;
      const boxClass = f.ccp ? 'is-ccp' : isDispensa ? 'is-dispensa' : '';
      return `
      <div class="haccp-step">
        <div class="haccp-step-arrow">
          ${fi>0?'<div class="haccp-arrow-line"></div><div class="haccp-arrow-head">▼</div>':'<div style="height:8px"></div>'}
        </div>
        <div class="haccp-box ${boxClass}">
          <div class="haccp-box-head">
            <span class="haccp-step-name">${fi+1}. ${f.nome}</span>
            ${badgeHtml}
          </div>
          <div class="haccp-box-body">
            <div class="haccp-field"><label>⚠ Pericolo</label><p>${f.pericolo}</p></div>
            <div class="haccp-field"><label>✓ Misura di controllo</label><p>${f.misura}</p></div>
          </div>
        </div>
      </div>`;
    }).join('');
    const adaptHtml = Object.entries(adapt).map(([k,v]) => `
      <div class="adapt-card adapt-${k}">
        <span class="adapt-label">${{vegan:'🌱 Vegan',lattosio:'🥛 Intolleranti lattosio',celiaci:'🌾 Celiaci',halal:'☪ Halal',kosher:'✡ Kosher'}[k]||k}</span>
        <p class="adapt-text">${v}</p>
      </div>`).join('');
    const diagramSvg = buildHaccpDiagram(haccp.fasi);
    const s = document.createElement('div');
    s.className = 'scheda';
    s.style.animationDelay = `${i*.07}s`;
    s.innerHTML = `
      <div class="scheda-header">
        <div class="scheda-num">${r.numero}</div>
        <div class="scheda-title-block">
          <div class="scheda-title">${r.title}</div>
          ${r.chef?`<div class="scheda-chef">Chef / Autore: ${r.chef}</div>`:''}
        </div>
        <div class="tags" style="margin:0;flex-shrink:0">
          ${r.tags.map(([l,c])=>`<span class="tag ${c}">${l}</span>`).join('')}
        </div>
      </div>
      <div class="scheda-body">
        <div class="scheda-cell diabete full">
          <div class="scheda-cell-label" style="color:var(--coral)"><span>💊</span> Prevenzione Diabete T2, Ipertensione &amp; Aterosclerosi</div>
          <div class="scheda-cell-content">${diabete}</div>
        </div>
        <div class="scheda-cell full" style="background:#F8F9FA">
          <div class="scheda-cell-label"><span>🍽</span> Adattamenti per esigenze dietetiche e religiose</div>
          <div class="adapt-grid">${adaptHtml}</div>
        </div>
        <div class="scheda-cell full">
          <div class="scheda-cell-label" style="color:var(--haccp-head)"><span>🔐</span> Piano HACCP — Diagramma di flusso</div>
          <div class="haccp-legend">
            <span><span class="haccp-ccp-badge">CCP</span> Punto Critico di Controllo</span>
            <span><span class="haccp-ok-badge">CP</span> Punto di Controllo</span>
            <span><span class="haccp-fifo-badge">CP · FIFO</span> Dispensa / T ambiente</span>
          </div>
          <div style="margin:1rem 0 .5rem;padding:.5rem;background:#f8f9fa;border-radius:4px;border:1px solid #e0e6f0">
            ${diagramSvg}
          </div>
          <div class="scheda-cell-label" style="margin-top:1rem;color:var(--haccp-head)"><span>📋</span> Dettaglio pericoli e misure di controllo</div>
          <div class="haccp-flow" style="margin-top:.8rem">${flowHtml}</div>
        </div>
      </div>
    `;
    grid.appendChild(s);
  });
}

function filterHaccp(cat, btn) {
  document.querySelectorAll('#view-haccp .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHaccp(cat);
}

/* ── PRINT SCHEDA COMPLETA (Ricetta + Analisi + HACCP) ── */
function printSchedaById(id) {
  const r = data.find(x => x.id === id);
  if (!r) return;
  const ex = extraData[id] || {};
  const appro = r.approfondimento || {};
  const adapt = ex.adattamenti || {};
  const haccp = (ex.haccp || {fasi:[]});
  const sdgs  = sdgData[id] || [];
  const marchioBadge = {DOP:'🏆 DOP',IGP:'🌿 IGP','PAT':'📜 PAT','Presidio Slow Food':'🐌 Presidio Slow Food'}[appro.marchio]||appro.marchio||'';
  const sdgColors = {1:'#e5243b',2:'#dda63a',3:'#4c9f38',4:'#c5192d',5:'#ff3a21',6:'#26bde2',7:'#fcc30b',8:'#a21942',9:'#fd6925',10:'#dd1367',11:'#fd9d24',12:'#bf8b2e',13:'#3f7e44',14:'#0a97d9',15:'#56c02b',16:'#00689d',17:'#19486a'};

  /* ── helpers ── */
  const sec = (icon, label, content, bg='#fff', color='#1B4F72') => `
    <div class="section" style="background:${bg};border-left:3px solid ${color}">
      <div class="sec-label" style="color:${color}">${icon} ${label}</div>
      <div class="sec-body">${content}</div>
    </div>`;

  const haccpFlow = haccp.fasi.map((f,i) => {
    const isDispensa = f.nome.includes('dispensa');
    const badgeClass = f.ccp ? 'ccp-badge' : isDispensa ? 'fifo-badge' : 'ok-badge';
    const badgeText = f.ccp ? 'CCP' : isDispensa ? 'CP · FIFO' : 'CP';
    const boxClass = f.ccp ? 'ccp' : isDispensa ? 'dispensa' : '';
    return `
    <div class="hf-step">
      ${i>0?'<div class="hf-arrow">▼</div>':''}
      <div class="hf-box ${boxClass}">
        <div class="hf-head">
          <span class="hf-name">${i+1}. ${f.nome}</span>
          <span class="hf-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="hf-body">
          <div><span class="hf-lbl">⚠ Pericolo</span><p>${f.pericolo}</p></div>
          <div><span class="hf-lbl">✓ Misura di controllo</span><p>${f.misura}</p></div>
        </div>
      </div>
    </div>`;
  }).join('');

  /* ── Diagramma di flusso SVG per la stampa ── */
  const printDiagramSvg = (() => {
    const fasi = haccp.fasi;
    if (!fasi || !fasi.length) return '';
    const ricezione = fasi.find(f => f.nome.toLowerCase().includes('ricezion'));
    const stocRef   = fasi.find(f => f.nome.toLowerCase().includes('stoccaggio') && !f.nome.toLowerCase().includes('dispensa'));
    const stocDisp  = fasi.find(f => f.nome.toLowerCase().includes('dispensa'));
    const remaining = fasi.filter(f => f !== ricezione && f !== stocRef && f !== stocDisp);
    const W=560, BW=160, BH=36, BRX=5;
    const CX=W/2, LX=130, RX=420;
    const COLORS={ccp:'#e74c3c',cp:'#2C3E50',fifo:'#e67e22',text:'#1a1a2e'};
    let y=18, svg='';
    function wrapText(txt,maxW,fs){const words=txt.split(' ');const lines=[];let cur='';const cpx=fs*.55;words.forEach(w=>{const t=cur?cur+' '+w:w;if(t.length*cpx>maxW-8){lines.push(cur);cur=w;}else cur=t;});if(cur)lines.push(cur);return lines;}
    function box(cx,cy,w,h,label,color,shape,badge){const lines=wrapText(label,w,9);const lh=12;const bh=Math.max(h,lines.length*lh+12);let el='';if(shape==='ellipse'){el=`<ellipse cx="${cx}" cy="${cy}" rx="${w/2}" ry="${bh/2}" fill="white" stroke="${color}" stroke-width="1.5"/>`;}else{el=`<rect x="${cx-w/2}" y="${cy-bh/2}" width="${w}" height="${bh}" rx="${BRX}" fill="white" stroke="${color}" stroke-width="${color===COLORS.ccp?2:1.5}" stroke-dasharray="${badge==='fifo'?'5,3':'none'}"/>`;}
    const ty=cy-(lines.length-1)*lh/2;const te=lines.map((l,i)=>`<text x="${cx}" y="${ty+i*lh}" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="${COLORS.text}" font-weight="${color===COLORS.ccp?'600':'400'}">${l}</text>`).join('');let be='';if(badge){const bc=badge==='ccp'?COLORS.ccp:badge==='fifo'?COLORS.fifo:COLORS.cp;const bl=badge==='ccp'?'CCP':badge==='fifo'?'CP·FIFO':'CP';be=`<rect x="${cx+w/2-30}" y="${cy-bh/2-1}" width="30" height="12" rx="2" fill="${bc}"/><text x="${cx+w/2-15}" y="${cy-bh/2+8}" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="700">${bl}</text>`;}return{svg:el+te+be,h:bh};}
    function arrow(x,y1,y2){return `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2-5}" stroke="#999" stroke-width="1.1"/><polygon points="${x-3},${y2-5} ${x+3},${y2-5} ${x},${y2}" fill="#999"/>`;}
    function hline(x1,x2,yy){return `<line x1="${x1}" y1="${yy}" x2="${x2}" y2="${yy}" stroke="#999" stroke-width="1.1"/>`;}
    function vline(x,y1,y2){return `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="#999" stroke-width="1.1"/>`;}
    const ih=28;svg+=box(CX,y+ih/2,150,ih,'INGREDIENTI',COLORS.cp,'ellipse','').svg;y+=ih;
    svg+=arrow(CX,y,y+22);y+=22;
    const rNome=ricezione?ricezione.nome.toUpperCase():'RICEZIONE MATERIE PRIME';
    const rBadge=ricezione?(ricezione.ccp?'ccp':'cp'):'ccp';
    const rColor=ricezione?.ccp?COLORS.ccp:COLORS.cp;
    const rB=box(CX,y+BH/2,BW*1.35,BH,rNome,rColor,'rect',rBadge);svg+=rB.svg;y+=rB.h;
    const splitY=y+18;svg+=vline(CX,y,splitY);svg+=hline(LX,RX,splitY);svg+=arrow(LX,splitY,splitY+18);svg+=arrow(RX,splitY,splitY+18);y=splitY+18;
    const sNome=stocRef?stocRef.nome.replace('Stoccaggio a T controllata — ','').replace('Stoccaggio refrigerato','STOCCAGGIO T CONTROLLATA').toUpperCase():'STOCCAGGIO T CONTROLLATA';
    const sB=box(LX,y+BH/2,BW,BH,sNome,COLORS.ccp,'rect','ccp');svg+=sB.svg;const lY=y+sB.h;
    const dNome='STOCCAGGIO T NON CONTROLLATA (DISPENSA)';
    const dB=box(RX,y+BH/2,BW,BH,dNome,COLORS.fifo,'rect','fifo');svg+=dB.svg;const rY=y+dB.h;
    const maxY=Math.max(lY,rY);const joinY=maxY+30;
    svg+=vline(LX,lY,joinY);svg+=vline(RX,rY,joinY);svg+=hline(LX,RX,joinY);svg+=arrow(CX,joinY,joinY+18);y=joinY+18;
    remaining.forEach((f,fi)=>{
      const fN=f.nome.toUpperCase();const fC=f.ccp?COLORS.ccp:COLORS.cp;const fBadge=f.ccp?'ccp':'cp';
      const fB=box(CX,y+BH/2,BW*1.45,BH,fN,fC,'rect',fBadge);svg+=fB.svg;y+=fB.h;
      if(fi<remaining.length-1){svg+=arrow(CX,y,y+16);y+=16;}
    });
    svg+=arrow(CX,y,y+20);y+=20;
    const somB=box(CX,y+BH/2,BW*1.25,BH,'SOMMINISTRAZIONE',COLORS.cp,'rect','cp');svg+=somB.svg;y+=somB.h;
    svg+=arrow(CX,y,y+18);y+=18;
    const fh=26;svg+=box(CX,y+fh/2,150,fh,'PIATTO DA CONSUMARE',COLORS.cp,'ellipse','').svg;y+=fh+12;
    return `<svg viewBox="0 0 ${W} ${y}" width="100%" style="max-width:520px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`;
  })();

  const adaptCards = Object.entries(adapt).map(([k,v])=>`
    <div class="adapt-card">
      <span class="adapt-lbl">${{vegan:'🌱 Vegan',lattosio:'🥛 Lattosio',celiaci:'🌾 Celiaci',halal:'☪ Halal',kosher:'✡ Kosher'}[k]||k}</span>
      <p>${v}</p>
    </div>`).join('');

  const sdgCards = sdgs.map(s=>`
    <div class="sdg-card">
      <div class="sdg-badge" style="background:${sdgColors[s.n]||'#333'}">${s.n}<br><small>${s.titolo.split(' ').slice(0,2).join(' ')}</small></div>
      <div><strong>SDG ${s.n} — ${s.titolo}</strong><p>${s.desc}</p></div>
    </div>`).join('');

  const html = `<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8">
<title>${r.numero}. ${r.title} — Scheda completa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

/* ── GO TO HACCP ── */
function goToHaccp(id) {
  // Switch to HACCP tab
  const haccpTab = document.querySelectorAll('.view-tab')[2];
  switchView('haccp', haccpTab);
  // Render if needed
  if (document.getElementById('haccp-grid').children.length === 0) renderHaccp('all');
  // Scroll to the matching scheda
  setTimeout(() => {
    const r = data.find(x => x.id === id);
    if (!r) return;
    const all = document.querySelectorAll('#haccp-grid .scheda');
    let target = null;
    all.forEach(s => { if (s.querySelector('.scheda-title') && s.querySelector('.scheda-title').textContent === r.title) target = s; });
    if (target) {
      target.scrollIntoView({behavior:'smooth', block:'start'});
      target.style.outline = '3px solid var(--terracotta)';
      setTimeout(() => target.style.outline = '', 2000);
    }
  }, 150);
}
